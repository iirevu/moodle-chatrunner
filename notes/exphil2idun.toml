u00e5_dyder\\\",\\n    \\\"description\\\": \\\"Studenten b\\u00f8r nevne minst \\u00e9n dyd som ikke er nevnt i *Tenk!*-boken, som bevis p\\u00e5 at hun kan identifisere dyder utenfor penselitteraturen.\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Ja \\u2013 du velger 'mot' og 'rettferdighet', som ikke er blant de mest utelukkende nevnte dydene i *Tenk!* (der f.eks. 'klarsynt', 't\\u00e5lmodighet', 'hum\\u00f8r' og 'sindighet' er nevnt som tydelige eksempler, s. 262). Dette viser at du kan overskride pensum og tenke eksempelvis om dyder i konkret handling.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Dydsetisk_sammenheng\\\",\\n    \\\"description\\\": \\\"Svaret b\\u00f8r peke p\\u00e5 at i dydsetikken handler det om karakter, ikke bare handlinger \\u2013 dyder er stabile trekk som gj\\u00f8r at vi \\u00f8nsker \\u00e5 handle riktig.\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Du nevner ikke eksplicit hvordan dyder *danner grunnlaget for god handling* i dydsetikken, som skiller seg fra for eksempel pliktigsetikken (Kant) eller konsekvensetikken (utilitarismen). I dydsetikken handler det om \\u00e5 bli en *virkelig god person*, ikke bare om \\u00e5 f\\u00f8lge en regel eller f\\u00e5 det beste resultatet (Tenk! s. 264\\u2013265).\\\"\\n  }\\n]\""
