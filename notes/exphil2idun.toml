 s. 256\\u2013257).\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Kritisk vurdering av om innvendingen er tilstrekkelig sterk\\\",\\n    \\\"description\\\": \\\"Vurderer om studenten vurderer b\\u00e5de styrker og svakheter ved dydsetikken, eller kun fokuserer p\\u00e5 negative sider.\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Studenten er ikke tilstrekkelig til \\u00e5 vurdere om innvendingen er helt overbevisende, eller om dydsetikken kan forsvares (f.eks. med henvisning til praktisk visdom eller 'phronesis' hos Aristoteles). En god refleksjon inkluderer at mens dydsetikken ikke gir mekaniske regler, den heller peker p\\u00e5 at dydig handling krever utviklet karakter og erfaring \\u2013 noe som kan anses som en styrke i komplekse situasjoner.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Presisering av hva dydsetikken faktisk tilbyr i praksis\\\",\\n    \\\"description\\\": \\\"Vurderer om studenten viser til at dydsetikken likevel kan gi veiledning \\u2013 men gjennom utvikling av karakter, ikke via konkrete regler.\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Studenten kunne utfordret seg selv videre: Dydsetikken sier ikke 'gj\\u00f8r X', men 'v\\u00e6r slik og slik person'. I praksis betyr dette at den dydige akt\\u00f8ren vil 'se' hva som er rett i situasjonen, som en erfaren lege 'ser' hva som er det beste for pasienten. Det er vanskelig \\u2013 men ikke umulig \\u2013 \\u00e5 trene. (Antonsen et al., 2025, s. 259\\u2013260).\\\"\\n  }\\n]\""
