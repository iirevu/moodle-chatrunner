nde er i. For eksempel vil det \\u00e5 v\\u00e6re modig i \\u00e9n situasjon kunne oppleves som dumdristig i en annen. Dyden ligger alts\\u00e5 i \\u00e5 handle p\\u00e5 riktig m\\u00e5te, gitt konteksten man befinner seg i (s. 258).\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Eksempler p\\u00e5 dyder som ikke st\\u00e5r i *Tenk!*-boken\\\",\\n    \\\"description\\\": \\\"Gir studenten eksempler p\\u00e5 dyder som ikke er nevnt i pensumboken?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Her b\\u00f8r studenten inkludere minst ett eksempel p\\u00e5 en dyd som ikke er nevnt i *Tenk!*-boken. Eksempler p\\u00e5 slike dyder kan v\\u00e6re: t\\u00e5lmodighet, raushet, ydmykhet, lojalitet eller selvdisiplin. For eksempel kan raushet komme til uttrykk i en situasjon der man deler av det man har med noen som trenger det mer, uten \\u00e5 forvente noe tilbake.\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Bruk av pensum\\\",\\n    \\\"description\\\": \\\"Bruker studenten pensum riktig til \\u00e5 underbygge svaret?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Svar som trekker inn relevante deler av pensum, for eksempel ved \\u00e5 vise til Antonsen et al. (2023, s. 258) eller andre kilder, styrker oppgaven. Her kan det v\\u00e6re lurt \\u00e5 knytte dyder til hvordan de utvikles gjennom erfaring, og hvorfor de er sentrale for den moralske akt\\u00f8ren.\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Klarhet og struktur\\\",\\n    \\\"description\\\": \\\"Er oppgaven tydelig og strukturert p\\u00e5 en m\\u00e5te som gj\\u00f8r den lett \\u00e5 f\\u00f8lge?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Sjekk at svaret er logisk oppbygd, med en innledning som definerer dyder, en hoveddel som forklarer sammenhengen mellom dyder og moralsk handling, samt konkrete eksempler. Dette gj\\u00f8r svaret mer tilgjengelig og lettere \\u00e5 forst\\u00e5.\\\"\\n}\\n]\""
