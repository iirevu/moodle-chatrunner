evner to dyder \\u2013 mot og rettferdighet \\u2013 men disse er antagelig nevnt i *Tenk!*-boken (de er klassiske dyder i Aristoteles-tradisjonen, som *Tenk!* bygger p\\u00e5). For \\u00e5 fullf\\u00f8re oppgaven, b\\u00f8r du nevne minst \\u00e9n ekstra dyd som ikke er i *Tenk!*, for eksempel: **t\\u00e5lmodighet**, **oppriktighet**, **taktfullhet**, **hum\\u00f8r**, eller **genersomhet**. Dette viser at du forst\\u00e5r at dyder er en mengde \\u2013 ikke kun de store, klassiske.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Tiln\\u00e6rming_til_dydsetikkens_hovedid\\u00e9\\\",\\n    \\\"description\\\": \\\"Studenten forst\\u00e5r at dydsetikken fokuserer p\\u00e5 *hvem vi er* (karakter) snarere enn kun *hvordan vi handler* (regler eller konsekvenser).\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Det er ikke helt tydelig om du tar stilling til hvorfor dydsetikken skiller seg fra andre teorier (som handlingsetikk eller konsekvensetikk). En viktig del av dydsetikken er at den starter fra *hvem en er* \\u2013 alts\\u00e5 hvilke dyder en har innarbeidet \\u2013 og derfra forst\\u00e5r en hvordan en handler. Du beskriver hvordan dyder f\\u00f8rer til handling, men kunne tydeliggjort at det er *karakteren* som er utgangspunktet, ikke regler eller konsekvenser.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Spr\\u00e5klig_klarhet_og_fullstendighet\\\",\\n    \\\"description\\\": \\\"Svaret er tydelig, fullstendig og i henhold til oppgaveteksten.\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Svaret er klart og bra strukturert. Du svarer direkte p\\u00e5 hva en dyd er og hvordan den kobles til handling. Men for \\u00e5 f\\u00e5 fullt antall poeng, b\\u00f8r du inkludere minst ett eksempel p\\u00e5 en dyd som ikke er nevnt i *Tenk!*.\\\"\\n  }\\n]\""
