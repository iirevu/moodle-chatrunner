gpt_svar = "\"[\\n    {\\n        \\\"testName\\\": \\\"Definisjon av dyd\\\",\\n        \\\"description\\\": \\\"Svarer studenten p\\u00e5 hva en dyd er?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Studenten b\\u00f8r definere hva en dyd er, og at det ikke bare er en positiv egenskap, men et godt karaktertrekk som former hvem vi er og hvordan vi handler (se Antonsen et al., 2023, s. 258). Et godt svar vil inkludere at dyder utvikles over tid gjennom erfaring og praksis.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Dydens rolle i moralsk handling\\\",\\n        \\\"description\\\": \\\"Forklarer studenten sammenhengen mellom dyder og god moralsk handling, i tr\\u00e5d med dydsetikken?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Studenten b\\u00f8r forklare at if\\u00f8lge dydsetikken m\\u00e5 gode handlinger ses i sammenheng med den akt\\u00f8rens liv og situasjon, og at handlinger som samsvarer med dydene regnes som moralsk riktige (se pensumbeskrivelsen). Det er ikke nok kun \\u00e5 nevne at 'dyder har noe med moral \\u00e5 gj\\u00f8re'; det m\\u00e5 komme tydelig frem hvorfor.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Dydsetikkens perspektiv p\\u00e5 situasjon og akt\\u00f8r\\\",\\n        \\\"description\\\": \\\"Forklarer studenten at dydsetikken vektlegger b\\u00e5de situasjonen og den moralske akt\\u00f8ren?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Studenten b\\u00f8r poengtere at dydsetikken legger vekt p\\u00e5 at b\\u00e5de konteksten (situasjonen) og personen (akt\\u00f8ren) spiller en rolle for hva som er en god handling. Det handler ikke bare om regler eller konsekvenser, men om personen selv og hennes karakter.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Eksempel p\\u00e5 dyd fra pensum\\\",\\n        \\\"description\\\": \\\"Inkluderer studenten et eksempel p\\u00e5 en dyd i praksis?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Det b\\u00f8r v\\u00e6re med et konkret eksempel p\\u00e5 hvordan en dyd kan komme til uttrykk i handling. Pensum gir eksemplet med medf\\u00f8lelse, men det er ogs\\u00e5 andre eksempler som kan brukes, som \\u00e6rlighet eller mot.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Eksempler p\\u00e5 dyder utenfor *Tenk!*-boken\\\",\\n        \\\"description\\\": \\\"Gir studenten eksempler p\\u00e5 dyder som ikke er nevnt i *Tenk!*-boken?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Studenten m\\u00e5 gi minst ett eksempel p\\u00e5 en dyd som ikke st\\u00e5r i *Tenk!*-boken. Dette kan v\\u00e6re dyder som t\\u00e5lmodighet, nysgjerrighet, beskjedenhet, lojalitet eller motstandskraft (resiliens). Poenget er at de selv reflekterer over hva som kan v\\u00e6re dyder utenfor de gitte eksemplene.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Klarhet og struktur\\\",\\n        \\\"description\\\": \\\"Er svaret klart strukturert og forst\\u00e5elig?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Et godt svar b\\u00f8r ha en klar oppbygning der definisjon, teori (sammenheng mellom dyder og handling), konkrete eksempler og egne refleksjoner henger sammen. Bruk av avsnitt og tydelige overganger mellom deler av svaret vil gj\\u00f8re teksten mer lesbar.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Teoretisk forankring\\\",\\n        \\\"description\\\": \\\"Refererer studenten eksplisitt til dydsetikkens perspektiv og/eller pensum (f.eks. Antonsen et al., 2023)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Selv om det ikke alltid kreves direkte sitater, b\\u00f8r studenten vise at de har forst\\u00e5tt teorien gjennom \\u00e5 bruke begreper og perspektiver fra dydsetikken. Det styrker svaret om de kan koble til pensum (f.eks. Antonsen et al., 2023).\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Refleksjon over dyders praktiske betydning\\\",\\n        \\\"description\\\": \\\"G\\u00e5r studenten utover teoretiske beskrivelser og reflekterer over hvordan dyder formes eller praktiseres i virkeligheten?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Det er en styrke hvis studenten ikke bare gjengir teori, men reflekterer over hvordan dyder oppst\\u00e5r eller utvikles, for eksempel gjennom vaner, fellesskap eller utfordrende situasjoner (jf. Aristoteles' tanke om at dyder utvikles gjennom praksis).\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Balansert fremstilling\\\",\\n        \\\"description\\\": \\\"Unng\\u00e5r studenten \\u00e5 fremstille dyder som utelukkende 'positive egenskaper' uten kontekst?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Studenten b\\u00f8r unng\\u00e5 \\u00e5 redusere dyder til 'det \\u00e5 v\\u00e6re snill' eller 'bare positive trekk'. Dyder handler om gode karaktertrekk som krever omtenksom ut\\u00f8velse ut fra hver enkelt situasjon. En dyd som mot kan f.eks. v\\u00e6re uhensiktsmessig i en naiv versjon, og m\\u00e5 modereres med klokskap.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Originalitet\\\",\\n        \\\"description\\\": \\\"Kommer det frem at studenten har tenkt selv, og ikke bare gjengir eksempler fra pensum?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Selv om pensumeksempler kan brukes, b\\u00f8r studenten vise egne tanker, enten gjennom originale eksempler, refleksjon over egne erfaringer, eller kritisk vurdering av hva som *ikke* er en dyd. Det viser dybde i forst\\u00e5elsen.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Kritisk perspektiv (valgfritt, men en styrke)\\\",\\n        \\\"description\\\": \\\"Gir studenten rom for en kritisk vinkling p\\u00e5 dydsetikkens utfordringer eller begrensninger?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette punktet er ikke p\\u00e5krevd, men er en styrke hvis studenten kort nevner utfordringer ved dydsetikken, som relativitet (hva som anses som dydig kan variere mellom kulturer) eller hvordan man skal vurdere motstridende dyder (eks. \\u00e6rlighet vs. snillhet).\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Spr\\u00e5k\\\",\\n        \\\"description\\\": \\\"Er svaret skrevet p\\u00e5 godt og presist akademisk spr\\u00e5k?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Studenten b\\u00f8r formulere seg klart og presist, uten un\\u00f8dig uformelt spr\\u00e5k. Akademisk skrivem\\u00e5te inneb\\u00e6rer ogs\\u00e5 \\u00e5 bruke relevante begreper korrekt (f.eks. 'moralakt\\u00f8r', 'karaktertrekk', 'dydsetikk').\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Fullstendighet\\\",\\n        \\\"description\\\": \\\"Dekker svaret alle deler av oppgaven?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Oppgaven sp\\u00f8r om (1) definisjon av dyd, (2) dyder og god moralsk handling if\\u00f8lge dydsetikken, og (3) egne eksempler p\\u00e5 dyder. Et fullstendig svar b\\u00f8r dekke alle tre delene tydelig.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Eksempel p\\u00e5 dyd i dynamisk situasjon\\\",\\n        \\\"description\\\": \\\"Bruker studenten et eksempel der dyden m\\u00e5 balanseres eller tilpasses konteksten?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"En dyd handler ikke om \\u00e5 f\\u00f8lge et fast skjema, men viser seg i konkrete handlinger der situasjonen krever skj\\u00f8nn. Et godt eksempel vil vise hvordan en dyd ut\\u00f8ves p\\u00e5 ulike m\\u00e5ter avhengig av omstendighetene \\u2013 f.eks. at mot kan bety \\u00e5 si ifra *eller* \\u00e5 tie stille p\\u00e5 riktig tidspunkt.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Skille mellom dyd og konsekvens\\\",\\n        \\\"description\\\": \\\"Unng\\u00e5r studenten \\u00e5 blande dydsetikk med konsekvensetikk (utilitarisme) eller pliktetikk (Kant)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dydsetikken skiller seg fra andre etiske teorier ved at den fokuserer p\\u00e5 karakteren til akt\\u00f8ren, ikke handlingens konsekvenser (konsekvensetikk) eller lydighet mot regler (pliktetikk). Det b\\u00f8r komme frem at dydsetikken handler om hvem vi *er*, ikke bare hva vi *gj\\u00f8r*.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Kobling til livslang l\\u00e6ring\\\",\\n        \\\"description\\\": \\\"Gir studenten rom for at dyder utvikles over tid, og ikke er medf\\u00f8dte?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Aristoteles mente at dyder utvikles gjennom praksis og erfaring; vi blir ikke f\\u00f8dt med dem. Et godt svar b\\u00f8r ber\\u00f8re at moralsk modenhet er en prosess, som faller sammen med dydsetikkens fokus p\\u00e5 livet som hele (jf. pensum).\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Valg av eksempler p\\u00e5 dyder\\\",\\n        \\\"description\\\": \\\"Er de valgte eksemplene p\\u00e5 dyder (fra *Tenk!*-boken eller egne) representative for dydsetisk tenkning?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Eksempler p\\u00e5 dyder b\\u00f8r v\\u00e6re karaktertrekk som former personen og handlingen, ikke bare regler eller holdninger uten dybde. T\\u00e5lmodighet, visdom eller motstandskraft er gode eksempler, mens '\\u00e5 v\\u00e6re glad' eller '\\u00e5 like folk' er for overfladiske.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Sammenheng mellom teori og eksempel\\\",\\n        \\\"description\\\": \\\"Kobler studenten eksemplene sine tilbake til dydsetikken p\\u00e5 en overbevisende m\\u00e5te?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Det er ikke nok \\u00e5 liste opp eksempler; hver eksempel b\\u00f8r forklares *hvorfor* det er en dyd i lys av dydsetikken. For eksempel: 'Nysgjerrighet er en dyd fordi den fremmer intellektuell vekst og utforskende handlinger, noe som bidrar til et godt liv if\\u00f8lge Aristoteles'.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Rolle for fellesskapet\\\",\\n        \\\"description\\\": \\\"Nevner studenten om dyder har en sosial eller kollektiv dimensjon?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette punktet er ikke p\\u00e5krevd, men vil styrke svaret. Dyder utvikles ofte i fellesskap (familie, venner, samfunn) og kan ikke forst\\u00e5s utenfor sosiale kontekster. For eksempel kan \\u00e6rlighet v\\u00e6re en dyd som opprettholdes av samfunnets tillitssystemer.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Balanserte dyder (det gylne middelvei)\\\",\\n        \\\"description\\\": \\\"Ber\\u00f8rer studenten Aristoteles' tanke om at dyder handler om \\u00e5 finne en balanse mellom to ytterpunkter?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette blir ofte kalt 'det gylne middelvei', der en dyd ligger mellom to laster. F.eks. er mot balansert mellom feighet og dumdristighet. Studentens svar vil f\\u00e5 mer dybde hvis det vises til dette prinsippet.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Empirisk eller narrativ forankring\\\",\\n        \\\"description\\\": \\\"Bruker studenten case eller fortellende elementer for \\u00e5 illustrere dyder?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Gode svar benytter ofte enkle case eller fortellinger for \\u00e5 vise hvordan dyder kommer til uttrykk. F.eks.: 'En l\\u00e6rer viser t\\u00e5lmodighet ved \\u00e5 gi ekstra tid til en elev som sliter, istedenfor \\u00e5 bli irritert eller gi opp'. Dette gj\\u00f8r svaret mer levende.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Handlingsanvisning\\\",\\n        \\\"description\\\": \\\"Forklarer studenten hvordan dyder *anviser handling*, eller blir det st\\u00e5ende p\\u00e5 et abstrakt niv\\u00e5?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dydsetikken gir ikke konkrete handlingsregler, men krever at vi ut\\u00f8ver skj\\u00f8nn i situasjonen. Studenten kan gjerne nevne at dyder 'veileder' eller 'former' handlinger uten \\u00e5 gi fasitsvar \\u2013 nettopp fordi moral er situasjonsavhengig.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Metaforer eller analogier\\\",\\n        \\\"description\\\": \\\"Bruker studenten gode metaforer eller analogier for \\u00e5 forklare dyder?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Metaforer kan hjelpe leseren til \\u00e5 forst\\u00e5 abstrakte begreper. F.eks.: 'En dyd er som et musikkinstrument \\u2013 det m\\u00e5 stemmes og \\u00f8ves p\\u00e5 for \\u00e5 kunne spilles godt'. Et slikt grep kan gj\\u00f8re svaret mer engasjerende.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Oppsummering eller konklusjon\\\",\\n        \\\"description\\\": \\\"Runder studenten av svaret p\\u00e5 en god m\\u00e5te?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"En kort oppsummering eller konklusjon trekker tr\\u00e5dene sammen. Dette kan v\\u00e6re s\\u00e5 enkelt som: 'Dyder er alts\\u00e5 karaktertrekk som former oss som mennesker, og som gj\\u00f8r oss i stand til \\u00e5 handle godt i ulike situasjoner.'\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Uthenting av l\\u00e6ringsutbytte\\\",\\n        \\\"description\\\": \\\"Viser studenten at de har forst\\u00e5tt dydsetikken som et alternativ (eller supplement) til andre etiske teorier?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dydsetikken st\\u00e5r i kontrast til konsekvensetikk og pliktetikk, og studenten b\\u00f8r vise at de har forst\\u00e5tt hva som gj\\u00f8r dydsetikken s\\u00e6regen. F.eks. at den fokuserer p\\u00e5 personen 'bak' handlingen, ikke selve handlingen eller konsekvensen.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Personlig relevans\\\",\\n        \\\"description\\\": \\\"Kobler studenten temaet til egen livsverden eller erfaring?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette er ikke p\\u00e5krevd, men vil kunne gi svaret mer tyngde. F.eks.: 'I min praksis som fotballtrener har jeg sett hvordan mot kan v\\u00e6re en dyd b\\u00e5de for \\u00e5 st\\u00e5 imot press og for \\u00e5 bry seg om medspilleres velv\\u00e6re.'\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Referanser til gresk filosofi\\\",\\n        \\\"description\\\": \\\"Viser studenten kjennskap til Aristoteles, som er sentral i dydsetikken?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Selv om detaljkunnskap om Aristoteles ikke er p\\u00e5krevd, vil henvisning til ham (f.eks. om eudaimonia eller det gylne middelvei) styrke svaret. Studenten viser da at de gjengir et etablert teoretisk fundament.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Nevn en ikke-tradisjonell dyd\\\",\\n        \\\"description\\\": \\\"Vurderer studenten dyder som ikke tradisjonelt listes opp (f.eks. selvironi eller tilgivelse)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Oppgaven krever eksempler p\\u00e5 dyder som ikke st\\u00e5r i *Tenk!*-boken. Gode svar kan inneholde 'moderne' eller kontekstavhengige dyder som beskyttende humor, tilgivelse, eller \\u00f8kologisk ansvarlighet. Det utvider forst\\u00e5elsen av dyder som kulturelt og historisk betinget.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Sammenheng mellom dyder\\\",\\n        \\\"description\\\": \\\"Reflekterer studenten over hvordan dyder henger sammen eller forsterker hverandre?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette er en avansert refleksjon, men kan styrke svaret. Studenten kan f.eks. nevne at vennlighet og \\u00e6rlighet ofte forsterker hverandre, eller at mot og visdom m\\u00e5 g\\u00e5 h\\u00e5nd i h\\u00e5nd for \\u00e5 bli ekte dyder.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Litter\\u00e6r eller kulturell forankring\\\",\\n        \\\"description\\\": \\\"Bruker studenten eksempler fra film, litteratur eller historie for \\u00e5 illustrere dyder?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Ikke p\\u00e5krevd, men gir tyngde. For eksempel kan man vise til Gandhis ikke-vold som uttrykk for mot, eller Joanne Rowlings persongalleri som viser et mangfold av dyder (og laster).\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Etiske dilemmaer\\\",\\n        \\\"description\\\": \\\"Settes dyder p\\u00e5 pr\\u00f8ve gjennom etiske dilemmaer eller konflikter?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"En styrke er hvis studenten viser hvordan dyder kan komme i konflikt med seg selv (f.eks. \\u00e6rlighet vs. barmhjertighet). Dydsetikken krever skj\\u00f8nn, og dilemmaer fremhever dette poeng sterkt.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Universelle vs. kulturelt betingede dyder\\\",\\n        \\\"description\\\": \\\"Ber\\u00f8rer studenten sp\\u00f8rsm\\u00e5let om dyder er universelle eller kulturelt betinget?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Et kritisk sp\\u00f8rsm\\u00e5l innen dydsetikk. En refleksjon over at noen dyder kan oppleves som universelle (som mot eller rettferdighet), mens andre er mer kulturavhengige (som ydmykhet), gir svar mer dybde.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Dyders rolle i yrkeslivet\\\",\\n        \\\"description\\\": \\\"Kobler studenten dyder til profesjonsetikk eller yrkesut\\u00f8velse?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette er relevant for mange studenter (f.eks. l\\u00e6rer-, helse- eller teknologistudenter). Dyder som integritet, omsorg og profesjonell skepsis kan knyttes til eget fremtidig yrke.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Dydsetikkens praktiske anvendelse\\\",\\n        \\\"description\\\": \\\"Diskuterer studenten hvordan dydsetikken kan anvendes i komplekse situasjoner (f.eks. klimakrisen, algoritmers etikk)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette er en styrke, s\\u00e6rlig hvis svaret kobler seg til aktuelle problemstillinger. F.eks. at forsiktighet kan v\\u00e6re en dyd n\\u00e5r man utvikler kunstig intelligens, eller at solidaritet kan v\\u00e6re en dyd i m\\u00f8te med klimautfordringer.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Moderne dydsetikk\\\",\\n        \\\"description\\\": \\\"Viser studenten kjennskap til moderne dydsetikere (f.eks. Alasdair MacIntyre, Philippa Foot eller Martha Nussbaum)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Selv om kun en kort omtale forventes, vil kjennskap til sentrale tenkere vise teoretisk bredde. For eksempel kan MacIntyres fokus p\\u00e5 dyder som samfunnsbyggende nevnes.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Dyd vs. dydsignaler\\\",\\n        \\\"description\\\": \\\"Skiller studenten mellom ekte dyder og overflatisk dydsignalisering?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Kritisk refleksjon over 'virtue signaling' eller falske dyder er ikke p\\u00e5krevd, men vil v\\u00e6re en styrke. Ekte dyder kommer til uttrykk i handlinger som springer ut av karakteren, ikke som en floskel eller for \\u00e5 fremst\\u00e5 bedre.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Dydsfokus vs. regeltretthet\\\",\\n        \\\"description\\\": \\\"Sammenligner studenten dydsetikkens fokus p\\u00e5 karakter med pliktetikkens regelorientering?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"En relevant sammenligning for \\u00e5 vise forst\\u00e5else av hva dydsetikk st\\u00e5r for. Mens Kant fokuserer p\\u00e5 plikt og regler, fokuserer dydsetikken p\\u00e5 personen og dens moralske utvikling.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Emosjoners rolle i dydsetikken\\\",\\n        \\\"description\\\": \\\"Nevner studenten at dyder ofte er knyttet til emosjoner og holdninger, ikke bare rasjonelle valg?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette gir svar mer dybde. For eksempel er medf\\u00f8lelse en dyd som handler om b\\u00e5de emosjonell innlevelse og handlekraft. Uten emosjonell engasjement blir handlinger lett mekaniske.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Arv og milj\\u00f8\\\",\\n        \\\"description\\\": \\\"Ber\\u00f8rer studenten hvordan dyder formes gjennom arv, oppdragelse, erfaring og refleksjon?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Et godt svar kan nevne at dyder ikke oppst\\u00e5r i et vakuum, men formes av genetikk, familie, kultur, utdanning og personlige valg. Dette viser en helhetlig forst\\u00e5else av moralsk modning.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Eksistensielt perspektiv\\\",\\n        \\\"description\\\": \\\"Kobler studenten dydene til dypere sp\\u00f8rsm\\u00e5l om hva et godt liv er (eudaimonia)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette forankrer dydsetikken til Aristoteles' id\\u00e9 om *eudaimonia* \\u2013 menneskelig blomstring. Studenten kan kort nevne at dyder skal tjene et godt liv, ikke bare 'riktige' handlinger.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Kvinners rolle i dydsetikken\\\",\\n        \\\"description\\\": \\\"Inkluderer studenten perspektiv fra feministisk dydsetikk (f.eks. omsorg som dyd)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Ikke p\\u00e5krevd, men relevant for \\u00e5 nyansere forst\\u00e5elsen av dyder. Feministisk dydsetikk har kritisert den tradisjonelle dydebegrepet for \\u00e5 overse dyder forbundet med kvinnelige erfaringer (f.eks. omsorg eller empati).\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Utvikling over tid\\\",\\n        \\\"description\\\": \\\"Nevner studenten at det som anses som dyder kan endre seg over tid (f.eks. historisk eller kulturelt)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette gir svar mer kompleksitet. Et eksempel er at individualisme kan v\\u00e6re en dyd i vestlige samfunn, mens kollektiv harmoni kan v\\u00e6re sentralt i andre kulturer.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Dydsetikk og teknologi\\\",\\n        \\\"description\\\": \\\"Relaterer studenten dydsetikk til etiske utfordringer knyttet til teknologi (f.eks. personvern, AI)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Ikke p\\u00e5krevd, men vil gj\\u00f8re svaret aktuelt. Dyder som ansvarlighet og forutseenhet kan knyttes til hvordan vi m\\u00f8ter menneskeskapte risikoer.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Oppsummerende kontrast mellom teorier\\\",\\n        \\\"description\\\": \\\"Kontrasterer studenten dydsetikken med andre etiske teorier p\\u00e5 en oppsummerende m\\u00e5te?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"En kort oppsummering av forskjellen p\\u00e5 dydsetikk, pliktetikk og konsekvensetikk vil vise at studenten har oversikt over det etiske landskapet som helhet.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Personlig vekst\\\",\\n        \\\"description\\\": \\\"Snakker studenten om dydsetikken som en vei til personlig vekst (ikke bare regelf\\u00f8lgelse)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dydsetikken handler i bunn og grunn om hvordan vi kan bli bedre mennesker, ikke bare hvordan vi skal h\\u00e5ndtere enkeltvalg. Denne vekstaspektet kan l\\u00f8ftes frem for \\u00e5 vise teorien filosofiske tyngdepunkt.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Ikke-menneskelige dyder\\\",\\n        \\\"description\\\": \\\"Tar studenten opp dyder i andre kontekster enn menneskelig handling (f.eks. dydsetikk anvendt p\\u00e5 dyr, institusjoner eller natur)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette er et originalt perspektiv. F.eks. kan man snakke om at en organisasjon kan ha dyder som \\u00e5penhet eller b\\u00e6rekraft, eller at et dyrs lojalitet kan tolkes som en dydslignende egenskap.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Kontekstavhengighet i praksis\\\",\\n        \\\"description\\\": \\\"Illustrerer studenten hvordan dyder m\\u00e5 tolkes ulikt avhengig av kontekst?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Et poeng innen dydsetikk er nettopp at moralske handlinger ikke kan sl\\u00e5s fast p\\u00e5 forh\\u00e5nd. F.eks. kan \\u00e6rlighet bety \\u00e5 si sannheten til en pasient, men i andre situasjoner bety \\u00e5 skjerme den fra un\\u00f8dig belastning. Studenten b\\u00f8r vise denne dynamikken.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Dyd vs. kompetanse\\\",\\n        \\\"description\\\": \\\"Skiller studenten mellom dyder og tekniske eller praktiske ferdigheter?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Det er viktig \\u00e5 skille mellom dyder (karaktertrekk) og ferdigheter (som \\u00e5 lage god mat eller programmere). Dyder handler om hvordan vi *er* som mennesker, ikke hva vi *kan*.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Moralsk eksempler\\\",\\n        \\\"description\\\": \\\"Bruker studenten moralske forbilder (rollemodeller) for \\u00e5 illustrere dyder?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Aristoteles mente at vi l\\u00e6rer dyder gjennom \\u00e5 etterligne moralske forbilder. Et godt svar kan nevne historiske personer (Mandela, Mother Teresa) eller personer i studentens eget liv som eksemplifiserer dyder.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Dydsetikkens relevans i dag\\\",\\n        \\\"description\\\": \\\"Reflekterer studenten over dydsetikkens relevans i et moderne, komplekst samfunn?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Et sterkt svar kan kort diskutere hvorfor dydsetikken er relevant i dag, f.eks. som motvekt til regelorienterte systemer eller individualisme. Studenten kan nevne at fokus p\\u00e5 karakter fremfor regler kan bidra til mer helhetlige l\\u00f8sninger p\\u00e5 moralske utfordringer.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Fremtidsperspektiv\\\",\\n        \\\"description\\\": \\\"Tar studenten opp hvordan dydsetikken kan v\\u00e6re relevant for fremtidens etiske utfordringer?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette er ikke p\\u00e5krevd, men vil kunne gi svar mer aktuell relevans. F.eks.: 'Dydsetikken kan hjelpe oss \\u00e5 navigere i en verden med kunstig intelligens og klimakriser, ved \\u00e5 fokusere p\\u00e5 menneskelig skj\\u00f8nn og ansvar.'\\\"\\n    }\\n    ,\\n    {\\n        \\\"testName\\\": \\\"Autonomi og relasjoner\\\",\\n        \\\"description\\\": \\\"Kobler studenten dyder til samspillet mellom autonomi og sosiale relasjoner?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette perspektivet viser forst\\u00e5else av at dyder utvikles i sosiale sammenhenger, men ogs\\u00e5 at vi har et ansvar for \\u00e5 forme v\\u00e5rt eget moralske liv. For eksempel kan selvdisiplin anses som en dyd som st\\u00f8tter b\\u00e5de individuell autonomi og fellesskap.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Dydsetikken som praktisk filosofi\\\",\\n        \\\"description\\\": \\\"Framhever studenten at dydsetikken er mer enn abstrakte id\\u00e9er \\u2014 at den har et praktisk form\\u00e5l i livene v\\u00e5re?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Trekk frem at Aristoteles' m\\u00e5l var \\u00e5 gi praktisk veiledning for \\u00e5 leve et godt liv. Studenten kan nevne at dydsetikken gir oss verkt\\u00f8y til \\u00e5 utvikle oss som mennesker, ikke bare forst\\u00e5 teori.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Nytteverdi utenfor filosofisalen\\\",\\n        \\\"description\\\": \\\"Formidler studenten dydsetikkens relevans utenfor akademiske diskurser?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Det vil styrke svaret hvis det kommer frem hvordan dydsetikken kan praktiseres i hverdagslivet, f.eks. i familie, p\\u00e5 jobb eller i m\\u00f8te med fremmede. Poenget er at moralsk utvikling er noe alle kan ta del i.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Ulike typer dyder\\\",\\n        \\\"description\\\": \\\"Skiller studenten mellom ulike kategorier av dyder (intellektuelle, moralske, praktiske)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Aristoteles skilte mellom intellektuelle dyder (f.eks. visdom) og moralske dyder (f.eks. mot). Et godt svar kan nevne at intellektuelle dyder utvikles gjennom l\\u00e6ring, mens moralske dyder formes gjennom vane.\\\"\\n    }\\n       ,\\n    {\\n        \\\"testName\\\": \\\"Milj\\u00f8messige dyder\\\",\\n        \\\"description\\\": \\\"Tar studenten opp milj\\u00f8messige dyder (f.eks. b\\u00e6rekraftighet, respekt for naturen)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette er et moderne og relevant tillegg. Dyder som ansvarlighet overfor fremtidige generasjoner eller n\\u00f8ysomhet kan nevnes som eksempler p\\u00e5 hvordan dydsetikken m\\u00f8ter milj\\u00f8utfordringer.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Internasjonale perspektiver\\\",\\n        \\\"description\\\": \\\"Inkluderer studenten ikke-vestlige dydstradisjoner (f.eks. ubuntu, bushido)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette gir svar bredde. For eksempel handler ubuntu (afrikansk filosofi) om at menneskelig velv\\u00e6re er knyttet til fellesskapet, og bushido (japansk samurai-etikk) verdsetter lojalitet og \\u00e6re. Slike perspektiver viser at dyder er universelle *og* kulturspesifikke.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Aristoteles' lykkebegrep\\\",\\n        \\\"description\\\": \\\"Kobler studenten dyder til Aristoteles' oppfatning av lykke (*eudaimonia*)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette trekker svaret sammen filosofisk, da Aristoteles ans\\u00e5 dyder som n\\u00f8dvendige for et godt liv. Studenten kan nevne at dyder ikke bare handler om \\u00e5 gj\\u00f8re det rette, men om \\u00e5 leve godt.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Empiri og etikk\\\",\\n        \\\"description\\\": \\\"Ber\\u00f8rer studenten om dydsetikkens syn kan forenes med empirisk forskning (f.eks. psykologi)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Et filosofisk interessant poeng. Moderne psykologi (f.eks. positiv psykologi) studerer karakterstyrker som overlapper med klassiske dyder. Studenten kan nevne at dyder har empirisk forankring i menneskelig trivsel.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Dogmatiske fallgruver\\\",\\n        \\\"description\\\": \\\"Unng\\u00e5r studenten \\u00e5 fremstille dydsetikken som dogmatisk eller ufeilbarlig?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Et godt svar er reflektert og viser at studenten er klar over at dydsetikken har svakheter, f.eks. at det er vanskelig \\u00e5 operasjonalisere dyder i komplekse systemer. \\u00c5penhet for slike sp\\u00f8rsm\\u00e5l viser kritisk tenkning.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Sosiale mediers rolle\\\",\\n        \\\"description\\\": \\\"Reflekterer studenten over hvordan sosiale medier p\\u00e5virker utviklingen av dyder?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette er et aktuelt perspektiv. Student kan diskutere om sosiale medier fremmer dyder som empati, eller om de undergraver dyder gjennom overfladiskhet og rett-fram-retorikk.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Moralske dilemmaer\\\",\\n        \\\"description\\\": \\\"Viser studenten hvordan dydsetikken h\\u00e5ndterer dilemmaer der to dyder st\\u00e5r mot hverandre?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Et godt eksempel p\\u00e5 et slikt dilemma er \\u00e5 m\\u00e5tte velge mellom \\u00e6rlighet og barmhjertighet. Studenten b\\u00f8r forklare at dydsetikken krever skj\\u00f8nn, ikke regeldominerte l\\u00f8sninger.\\\"\\n    }\\n    ,\\n    {\\n        \\\"testName\\\": \\\"Kunst og litteraturens rolle\\\",\\n        \\\"description\\\": \\\"Diskuterer studenten hvordan kunst og litteratur kan fremme dyder?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Aristoteles mente at teater og fortellinger var viktige for moralsk utvikling, da de lar oss leve oss inn i andres perspektiver. Studenten kan nevne at kunst kan styrke dyder som empati eller kritisk refleksjon.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Moralsk skj\\u00f8nn\\\",\\n        \\\"description\\\": \\\"Forklarer studenten hvorfor dydsetikken krever skj\\u00f8nn (*phronesis*), og ikke bare regler?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"*Phronesis* (praktisk visdom) er et n\\u00f8kkelbegrep hos Aristoteles. Det handler om evnen til \\u00e5 vurdere situasjonen og handle riktig uten \\u00e5 f\\u00f8lge faste forskrifter. Studenten b\\u00f8r nevne at skj\\u00f8nn er n\\u00f8dvendig nettopp fordi dyder m\\u00e5 tilpasses kontekst.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Undervisning og dydstrening\\\",\\n        \\\"description\\\": \\\"Nevner studenten at dyder kan trenes opp gjennom utdanning og bevisst praksis?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Aristoteles mente at vi blir rettferdige ved \\u00e5 gj\\u00f8re rettferdige ting. Studenten kan nevne at skoler og utdanning kan spille en aktiv rolle i \\u00e5 dyrke dyder som nysgjerrighet, samarbeid og kritisk tenkning.\\\"\\n    }\\n    ,\\n    {\\n        \\\"testName\\\": \\\"Erfaringens rolle\\\",\\n        \\\"description\\\": \\\"Understreker studenten at dyder utvikles gjennom erfaring, ikke teori alene?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette knytter an til Aristoteles' id\\u00e9 om at moralsk modenhet oppn\\u00e5s ved handling, ikke ved bare \\u00e5 lese om moral. Studenten kan nevne at vi blir modige ved \\u00e5 gj\\u00f8re modige ting, ikke ved kun \\u00e5 snakke om mot.\\\"\\n    }\\n    ,\\n    {\\n        \\\"testName\\\": \\\"M\\u00e5lsetting og dyder\\\",\\n        \\\"description\\\": \\\"Kobler studenten dyder til meningsfylte m\\u00e5l i livet?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Et dydsetisk perspektiv er at dyder hjelper oss til \\u00e5 realisere verdifulle livsm\\u00e5l (*telos*). F.eks. kan disiplin v\\u00e6re en dyd for \\u00e5 oppn\\u00e5 langvarige m\\u00e5l som utdannelse eller helse.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Tryggetest\\\",\\n        \\\"description\\\": \\\"Gj\\u00f8r studenten rede for hvordan en dyd som 'trygghet' (ikke nevnt i pensum) kan v\\u00e6re moralsk verdifull i visse sammenhenger?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette er et eksempel p\\u00e5 en mindre opplagt dyd. Trygghet som dyd handler om \\u00e5 skape psykologisk trygge rom (f.eks. i grupper eller arbeidsliv), som fremmer tillit og vekst hos andre. Studenten b\\u00f8r reflektere over n\\u00e5r denne egenskapen blir dydig, og n\\u00e5r den kanskje blir unnfallenhet.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Bruk av 'd\\u00e5rlige dyder' som moteksempel\\\",\\n        \\\"description\\\": \\\"Bruker studenten 'd\\u00e5rlige' egenskaper eller laster for \\u00e5 belyse hva dyder *ikke* er?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"\\u00c5 vise at gnienhet ikke er en dyd ved \\u00e5 sammenligne med gavmildhet, eller at feighet er motsatsen til mot, kan tydeliggj\\u00f8re hva dyder faktisk dreier seg om. Dette viser evne til kontrasttenkning.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Metaetisk perspektiv\\\",\\n        \\\"description\\\": \\\"Nevner studenten noe om dydsetikkens syn p\\u00e5 *hva moral er* (metaetikk)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Ikke p\\u00e5krevd, men en styrke. Dydsetikken impliserer at moral handlers om god karakter og handling som bidrar til et godt liv, ikke om abstrakte regler eller universelle plikter. Dette ber\\u00f8rer hva moral *er*, ikke bare hva vi b\\u00f8r gj\\u00f8re.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Robusthet\\\",\\n        \\\"description\\\": \\\"Gir studenten eksempler p\\u00e5 dyder som fremmer robusthet eller utholdenhet?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Robusthet som dyd handler om evnen til \\u00e5 m\\u00f8te motgang med mot og utholdenhet. Eksempel: En idrettsut\\u00f8ver som ikke gir opp etter nederlag. Studenten kan utforske hvordan slike dyder formas gjennom pr\\u00f8ving og feiling.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Dydsetikk og samfunnsendring\\\",\\n        \\\"description\\\": \\\"Diskuterer studenten hvordan kollektive dyder kan bidra til samfunnsendring (f.eks. solidaritet i kampen for rettferdighet)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette perspektivet viser at dyder ikke bare er individuelle, men kan ha bred sosial virkning. F.eks. kan mot og rettferdighetssans hos enkeltpersoner bidra aktivisme og sosial endring.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Automatisering og skj\\u00f8nn\\\",\\n        \\\"description\\\": \\\"Reflekterer studenten over utfordringene med \\u00e5 programmere 'dyder' inn i kunstig intelligens, gitt dydsetikkens krav om skj\\u00f8nn?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"En kritisk refleksjon: Kan algoritmer utvise dyd? Student kan diskutere hvordan dydsetikkens vekt p\\u00e5 skj\\u00f8nn (*phronesis*) skaper store utfordringer for implementasjon i robotikk, nettopp fordi skj\\u00f8nn krever erfaring og menneskelig forst\\u00e5else.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Oppgaveforst\\u00e5else\\\",\\n        \\\"description\\\": \\\"Har studenten svart p\\u00e5 alle sp\\u00f8rsm\\u00e5l i oppgaveteksten?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Oppgaven inneholder tre spesifikke deler: (1) definisjon av dyd, (2) dyder og god moralsk handling if\\u00f8lge dydsetikken, og (3) egne eksempler p\\u00e5 dyder (utenfor *Tenk!*-boken). Studenten m\\u00e5 adressere alle tre for at svaret skal v\\u00e6re fullstendig.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Akademisk innsiktsniv\\u00e5\\\",\\n        \\\"description\\\": \\\"Er svarframstillingen p\\u00e5 et niv\\u00e5 som viser forst\\u00e5else og refleksjon som passer for et introduksjonskurs i filosofi/etik?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Studenten b\\u00f8r vise at de har forst\\u00e5tt b\\u00e5de grunnleggende begreper (f.eks. 'karaktertrekk', 'moralsk akt\\u00f8r') og klarer \\u00e5 anvende teorien p\\u00e5 konkrete eksempler. Svaret b\\u00f8r hverken v\\u00e6re overflatisk eller un\\u00f8dvendig komplisert.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Inviterende tone\\\",\\n        \\\"description\\\": \\\"Er svaret formulert slik at det engasjerer leseren og inviterer til videre tenkning?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Formuleringer som fremst\\u00e5r som reflekterte og relevante vil \\u00f8ke svarenes verdi. F.eks.: 'Hvorfor er lojalitet en dyd n\\u00e5r den i verste fall kan f\\u00f8re til at vi dekker over overgrep?' En slik formulering viser engasjement og dypere tenkning.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Eksemplifisering av teoretiske begreper\\\",\\n        \\\"description\\\": \\\"Bruker studenten eksempler til \\u00e5 konkretisere abstrakte begreper som skj\\u00f8nn, karaktertrekk eller moralsk akt\\u00f8r?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Teoretiske begreper blir mer forst\\u00e5elige med gode eksempler. F.eks.: 'En moralsk akt\\u00f8r er en person som handler med omtanke for andres velv\\u00e6re, som en lege som tar ekstra hensyn til en engstelig pasients behov.'\\\"\\n    }\\n    ,\\n    {\\n        \\\"testName\\\": \\\"Vekt p\\u00e5 handling\\\",\\n        \\\"description\\\": \\\"Fokuserer studenten p\\u00e5 hvordan dyder *uttrykkes i handling*, ikke bare som abstrakte gode egenskaper?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dydsetikken krever at vi ser hvordan karaktertrekk sl\\u00e5r ut i praksis. F.eks.: 'T\\u00e5lmodighet viser seg hos l\\u00e6reren som gir eleven ekstra tid til \\u00e5 fullf\\u00f8re oppgaven, istedenfor \\u00e5 avbryte eller presse vedkommende.'\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Selvkritikk\\\",\\n        \\\"description\\\": \\\"Viser studenten evne til selvkritikk og refleksjon over egne eksempler eller argumenter?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dette er ikke p\\u00e5krevd, men gir tyngde. Studenten kan f.eks. omtale at deres eksempel p\\u00e5 ydmykhet kanskje ikke holder i en kultur der selvhevdelse anses som viktigere.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Terminologi\\\",\\n        \\\"description\\\": \\\"Bruker studenten relevante filosofiske termer p\\u00e5 en presis m\\u00e5te?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Bruken av ord som *akt\\u00f8r*, *karaktertrekk*, *phronesis*, *eudaimonia*, eller *det gylne middelvei* b\\u00f8r forekomme hvis de er kjent og forst\\u00e5tt. Misbruk av termer vil derimot svekke fremstillingen.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Originalitet i eksemplifisering\\\",\\n        \\\"description\\\": \\\"Er studentenes egne eksempler originale, eller er de gjenbruk fra forelesninger/tekster uten videre bearbeiding?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Eksempler som '\\u00e5penhet kan v\\u00e6re en dyd i vitenskapelig arbeid' er relevante, men knytter studenten det til egen studieerfaring eller samfunnsdebatt, framst\\u00e5r det som mer gjennomtenkt og engasjerende.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Sidenummer og referanser\\\",\\n        \\\"description\\\": \\\"Henviser studenten til relevante sider i pensum?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Studenter som viser bevissthet om kildebruk og presisjon ved \\u00e5 henvise til sidenummer (f.eks. Antonsen et al., 2023, s. 258) viser at de har lest teksten grundig og \\u00f8nsker \\u00e5 st\\u00f8tte seg p\\u00e5 litteraturen.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Hensyn til motforestillinger\\\",\\n        \\\"description\\\": \\\"G\\u00e5r studenten i dialog med potensielle motforestillinger mot dydsetikken (f.eks. relativisme)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"En styrke er om studenten kort dr\\u00f8fter kritikk av dydsetikken, f.eks.: 'En svakhet ved dydsetikken er at hva som regnes som dyder kan variere mellom kulturer og historiske epoker, noe som risikerer \\u00e5 gj\\u00f8re moral relativ'.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Hierarki av dyder\\\",\\n        \\\"description\\\": \\\"Diskuterer studenten om noen dyder er viktigere enn andre? Finnes det 'hoveddyder'?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Tradisjonelt har dyder som visdom, mot, m\\u00e5tehold og rettferdighet v\\u00e6rt omtalt som kardinaldyder (fra antikken), mens andre er sekund\\u00e6re. Studenten kan dr\\u00f8fte om slike hierarkier fremdeles er relevante.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Relasjonelle dyder\\\",\\n        \\\"description\\\": \\\"Tar studenten opp dyder som dreier seg om relasjoner til andre (f.eks. vennlighet, tilgivelse, tillit)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Mange dyder dreier seg om hvordan vi forholder oss til andre \\u2014 ikke bare oss selv. Eksempelvis er vennskap en dyd som fremmer b\\u00e5de det gode liv og felleskap. Slike relasjonelle dyder b\\u00f8r komme med i eksempler.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Beregnende dyder\\\",\\n        \\\"description\\\": \\\"Diskuterer studenten om noen dyder har elementer av beregning, selv om dydsetikken ikke er ren konsekvensetikk?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Noen moderne tolkninger av dydsetikken vektlegger at dyder kan inneb\\u00e6re en viss vurdering av konsekvenser. F.eks. kan gavmildhet handle om \\u00e5 gi slik at det skaper st\\u00f8rst mulig nytte, uten at dette gj\\u00f8r teorien til et form for utilitarisme.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Dyder og skam\\\",\\n        \\\"description\\\": \\\"Forklarer studenten hvordan skam (i moderat form) kan spille en positiv rolle i dannelsen av dyder?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Ikke n\\u00f8dvendig, men et interessant perspektiv. Aristoteles snakket om *aidos* (sunn skamf\\u00f8lelse) som en moralsk emosjon som kan hindre oss i \\u00e5 handle p\\u00e5 lastefullt vis. Studenten kan dr\\u00f8fte skammens rolle i \\u00e5 rette opp egne handlinger.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Dyd og vold\\\",\\n        \\\"description\\\": \\\"Reflekterer studenten over dyder som kommer i spill i ekstreme situasjoner, som krig eller katastrofer?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"I krigskontekst kan mot, lojalitet og selvoppofrelse v\\u00e6re sentrale dyder. Samtidig viser dette hvordan kontekst endrer dydenes betydning: Selvoppofrelse kan i fredstid oppleves som masochisme, mens det i krig kan v\\u00e6re heroiske handlinger.\\\"\\n    }\\n   ,\\n    {\\n        \\\"testName\\\": \\\"Dydsetikkens normative kraft\\\",\\n        \\\"description\\\": \\\"Forklarer studenten hvorfor dydsetikk regnes som en *normativ* etisk teori?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Normative teorier gir veiledning om hvordan vi *b\\u00f8r* handle. Studenten kan forklare at dydsetikken gj\\u00f8r dette ved \\u00e5 presisere at gode handlinger kommer fra individer med gode karaktertrekk.\\\"\\n    }\\n  ,\\n    {\\n        \\\"testName\\\": \\\"Kvalitative skiller mellom handlinger\\\",\\n        \\\"description\\\": \\\"Differensierer studenten mellom typer handlinger \\u2014 slik at ikke alle 'gode' handlinger stemples likt?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Dydsetikken tillater kvalitative skiller mellom handlinger som ser like ut. F.eks. kan en handling utf\\u00f8rt av medf\\u00f8lelse vurderes annerledes enn den samme handlingen gjort av pliktf\\u00f8lelse. Dette viser skj\\u00f8nnets rolle.\\\"\\n    }\\n]\""
type = "gpt_svar"

[[questions.answers.feedback.testfeedback]]
name = "Definisjon av dyd"
passed = false
mark = 1
description = "Svarer studenten på hva en dyd er?"
resultat = "Studenten bør definere hva en dyd er, og at det ikke bare er en positiv egenskap, men et godt karaktertrekk som former hvem vi er og hvordan vi handler (se Antonsen et al., 2023, s. 258). Et godt svar vil inkludere at dyder utvikles over tid gjennom erfaring og praksis."

[[questions.answers.feedback.testfeedback]]
name = "Dydens rolle i moralsk handling"
passed = false
mark = 1
description = "Forklarer studenten sammenhengen mellom dyder og god moralsk handling, i tråd med dydsetikken?"
resultat = "Studenten bør forklare at ifølge dydsetikken må gode handlinger ses i sammenheng med den aktørens liv og situasjon, og at handlinger som samsvarer med dydene regnes som moralsk riktige (se pensumbeskrivelsen). Det er ikke nok kun å nevne at 'dyder har noe med moral å gjøre'; det må komme tydelig frem hvorfor."

[[questions.answers.feedback.testfeedback]]
name = "Dydsetikkens perspektiv på situasjon og aktør"
passed = false
mark = 1
description = "Forklarer studenten at dydsetikken vektlegger både situasjonen og den moralske aktøren?"
resultat = "Studenten bør poengtere at dydsetikken legger vekt på at både konteksten (situasjonen) og personen (aktøren) spiller en rolle for hva som er en god handling. Det handler ikke bare om regler eller konsekvenser, men om personen selv og hennes karakter."

[[questions.answers.feedback.testfeedback]]
name = "Eksempel på dyd fra pensum"
passed = false
mark = 1
description = "Inkluderer studenten et eksempel på en dyd i praksis?"
resultat = "Det bør være med et konkret eksempel på hvordan en dyd kan komme til uttrykk i handling. Pensum gir eksemplet med medfølelse, men det er også andre eksempler som kan brukes, som ærlighet eller mot."

[[questions.answers.feedback.testfeedback]]
name = "Eksempler på dyder utenfor *Tenk!*-boken"
passed = false
mark = 1
description = "Gir studenten eksempler på dyder som ikke er nevnt i *Tenk!*-boken?"
resultat = "Studenten må gi minst ett eksempel på en dyd som ikke står i *Tenk!*-boken. Dette kan være dyder som tålmodighet, nysgjerrighet, beskjedenhet, lojalitet eller motstandskraft (resiliens). Poenget er at de selv reflekterer over hva som kan være dyder utenfor de gitte eksemplene."

[[questions.answers.feedback.testfeedback]]
name = "Klarhet og struktur"
passed = false
mark = 1
description = "Er svaret klart strukturert og forståelig?"
resultat = "Et godt svar bør ha en klar oppbygning der definisjon, teori (sammenheng mellom dyder og handling), konkrete eksempler og egne refleksjoner henger sammen. Bruk av avsnitt og tydelige overganger mellom deler av svaret vil gjøre teksten mer lesbar."

[[questions.answers.feedback.testfeedback]]
name = "Teoretisk forankring"
passed = false
mark = 1
description = "Refererer studenten eksplisitt til dydsetikkens perspektiv og/eller pensum (f.eks. Antonsen et al., 2023)?"
