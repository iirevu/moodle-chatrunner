.Vurdering: manglende) \\\"  \\n},{\\n  \\\"testName\\\": \\\"Kritisk bruk av eksempler\\\",\\n  \\\"description\\\": \\\"Vurderer om eksempelet (Mandela) illustrerer problemet med praktisk anvendelighet, eller om det brukes for \\u00e5 vise noe annet\\\",\\n  \\\"iscorrect\\\": false,\\n  \\\"resultat\\\": \\\"Eksempelet er velvalgt for \\u00e5 illustrere mot og dyd, men ikke for \\u00e5 belyse problematikken rundt praktisk anvendelighet. Mandela-saken viser at dyd kan ha h\\u00f8y personlig pris (lidelse, fengsel), men sier ingenting om hvorvidt det er vurderingsmessig vanskelig \\u00e5 finne ut hva som er den dydige handlingen, eller hvordan vi skal veie ulike dyder mot hverandre i praksis. Vurder om du kan bruke et eksempel som illustrerer en konkret etisk dilemma hvor det er uklart hvilken dyd som skal veie tyngst, for eksempel en situasjon hvor \\u00e6rlighet virker uempatisk, eller hvor mot grenser til dumdristighet. Alternativt kan du beholde Mandela, men sp\\u00f8rre: Hvordan visste Mandela n\\u00f8yaktig hvor grensen gikk mellom mot og selvdestruktiv fanatisme? Dette ber\\u00f8rer praktisk anvendelighet.Vurdering: delvis relevant \\u2013 kan omformuleres) \\\"  \\n},{\\n  \\\"testName\\\": \\\"Begrepsmessig presisjon\\\",\\n  \\\"description\\\": \\\"Sjekker om studenten skiller mellom 'vanskelig \\u00e5 leve etter' og 'vanskelig \\u00e5 anvende som beslutningsverkt\\u00f8y'\\\",\\n  \\\"iscorrect\\\": false,\\n  \\\"resultat\\\": \\\"Uklart \\u2013 krever presisering. Du bruker begrepet 'kontraintuitiv' om sammenhengen mellom dyd og lykke, noe som er riktig i den sammenhengen. Men oppgaven krever at du forholder deg til anvendelighet (applicability). Her kunne du dr\\u00f8ftet Aristoteles' begrep 'fronesis' (praktisk visdom) som dydsetikkens svar p\\u00e5 anvendelighetsproblemet: Det er nettopp fordi dydsetikken krever at vi utvikler evnen til \\u00e5 se hva som kreves i den konkrete situasjonen, at den kan oppleves som vanskelig \\u00e5 anvende. Innvendingen er da at ikke alle har slik praktisk visdom, mens forsvarerne ville si at dette er nettopp det som m\\u00e5 l\\u00e6res.Vurdering: trenger utdyping) \\\"  \\n},{\\n  \\\"testName\\\": \\\"Kildebruk og argumentativ st\\u00f8tte\\\",\\n  \\\"description\\\": \\\"Vurderer om kildene st\\u00f8tter opp om p\\u00e5standene om anvendelighetsproblemet\\\",\\n  \\\"iscorrect\\\": false,\\n  \\\"resultat\\\": \\\"Kildene adresserer et annet tema. Christensen (2008) og Antonsen et al. (2025) diskuterer eudaimonia og forholdet mellom dyd og lykke, ikke praktisk anvendelighet. For \\u00e5 styrke resonnementet om anvendelighet b\\u00f8r du vurdere \\u00e5 trekke inn Rosalind Hursthouse (hvis nevnt i pensum), som argumenterer for at dydsetikk faktisk gir handlingsveiledning gjennem virtuous agent-resoning, eller diskutere kritikken fra regel-etikerne (deontologi) som mener dydsetikken manglar klar beslutningsalgoritme. Sjekk om pensumlitteraturen diskuterer 'the practical guidance objection'.Vurdering: kildebruken er korrekt i form, men tematisk malplassert) \\\"  \\n},{\\n  \\\"testName\\\": \\\"Konstruktive veier videre\\\",\\n  \\\"description\\\": \\\"Formative forslag til hvordan studenten kan utvikle svaret til \\u00e5 omhandle anvendelighet\\\",\\n  \\\"iscorrect\\\": false,\\n  \\\"resultat\\\": \\\"Her er tre konkrete grep for \\u00e5 rette svaret mot oppgaven: (1) Start med \\u00e5 definer hva 'vanskelig \\u00e5 anvende i praksis' betyr: Er det uklarhet i hva dyder krever? Mangel p\\u00e5 prioritet mellom dyder? Kulturell variasjon i hva som regnes som dydig? (2) Dr\\u00f8ft deretter 'svaret' fra dydsetikerne: Aristoteles' praktiske visdom (phronesis) som evnen til \\u00e5 se hva som kreves i situasjonen, eller Hursthouse' 'v-argument' (hva ville den dydige gjort?). (3) Vurder om du er enig: Er dette en svakhet (for vagt) eller en styrke (fleksibilitet)? Mandela kan beholdes som illustrasjon p\\u00e5 at \\u00e5 finne den dydige handlingen krever d\\u00f8mmekraft i komplekse situasjoner, ikke bare \\u00e5 f\\u00f8lge regler.Vurdering: veien er \\u00e5pen for omstrukturering) \\\"  \\n}]\""
