gpt_svar = "\"[{\\n    \\\"testName\\\": \\\"Definisjon av dyd\\\",\\n    \\\"description\\\": \\\"Svarer studenten p\\u00e5 hva en dyd er? Defineres en dyd som et positivt karaktertrekk som disponerer oss til \\u00e5 handle p\\u00e5 bestemte m\\u00e5ter?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Du har ikke eksplisitt definert hva en dyd er. If\\u00f8lge pensum (s. 265) er en dyd et positivt karaktertrekk eller egenskap som disponerer oss til \\u00e5 handle p\\u00e5 bestemte m\\u00e5ter. Pr\\u00f8v \\u00e5 inkludere en tydelig definisjon av hva en dyd er i begynnelsen av svaret ditt. Dette vil hjelpe leseren \\u00e5 forst\\u00e5 grunnlaget for dydsetikken f\\u00f8r du g\\u00e5r videre til anvendelsen av den.\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Dydsetikkens grunnsyn\\\",\\n    \\\"description\\\": \\\"Forklarer studenten dydsetikkens grunnsyn \\u2013 at fokus ikke er p\\u00e5 moralske regler eller konsekvenser, men i stedet p\\u00e5 \\u00abhvilken person jeg \\u00f8nsker \\u00e5 v\\u00e6re\\u00bb?\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Godt jobbet! Du har forklart hovedpoenget i dydsetikken \\u2013 at fokuset er p\\u00e5 karakter og hvilken type person man \\u00f8nsker \\u00e5 v\\u00e6re, heller enn p\\u00e5 regler eller konsekvenser. Dette er sentralt i dydsetikken (s. 265).\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Dyd og god moralsk handling\\\",\\n    \\\"description\\\": \\\"Forklarer studenten hvordan dyder henger sammen med god moralsk handling? Nevnes det at dyder handler om \\u00e5 gj\\u00f8re det som er riktig i en gitt situasjon, og ikke det som f\\u00f8lger universelle regler?\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Du har forklart sammenhengen mellom dyder og god moralsk handling p\\u00e5 en god m\\u00e5te. Det er riktig at dyder ikke handler om \\u00e5 f\\u00f8lge universelle regler, men om \\u00e5 handle p\\u00e5 en m\\u00e5te som er passende i den konkrete situasjonen (s. 265).\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Eksempel p\\u00e5 situasjonsavhengig dyd\\\",\\n    \\\"description\\\": \\\"Gir studenten et godt eksempel p\\u00e5 en situasjon der en dyd kan variere ut fra omstendighetene (f.eks. \\u00e5 si fra om noe galt vs. \\u00e5 ikke si fra)?\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Eksemplet ditt med \\u00e5 si fra om noen stjeler, og at det i noen situasjoner kan v\\u00e6re riktig \\u00e5 ikke si fra, illustrerer godt hvordan dyder kan v\\u00e6re kontekstavhengige. Veldig bra!\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Eksempler p\\u00e5 dyder utenfor *Tenk!*-boken\\\",\\n    \\\"description\\\": \\\"Gir studenten eksempler p\\u00e5 dyder som ikke er nevnt i *Tenk!*-boken?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Her er det rom for forbedring. Du har ikke gitt eksempler p\\u00e5 dyder som ikke st\\u00e5r i *Tenk!*-boken. Pr\\u00f8v \\u00e5 tenke p\\u00e5 andre dyder som for eksempel t\\u00e5lmodighet, lojalitet, ydmykhet, mot, \\u00e6rlighet (dersom den ikke er nevnt i boken), kreativitet i moralske valg eller raushet. Dette vil vise at du tenker bredere enn det som er direkte nevnt i pensumboken.\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Avklaring av typisk misforst\\u00e5else\\\",\\n    \\\"description\\\": \\\"Unng\\u00e5r studenten en typisk misforst\\u00e5else, nemlig at dydsetikken mener at regler og konsekvenser er irrelevante? Avklares det at selv om fokus er p\\u00e5 karakter og situasjon, kan regler og konsekvenser likevel spille en rolle i vurderingen?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Du skriver at man i dydsetikken \\u00abikke tar i betraktning hva som er den moralske etikken n\\u00e5r vi tenker p\\u00e5 dydsetikk\\u00bb, og at man \\u00abikke tenker p\\u00e5 hva som er den moralske etikken\\u00bb. Dette kan lett misforst\\u00e5s som at regler og konsekvenser er helt irrelevante, noe som ikke er tilfellet. Selv om dydsetikken legger vekt p\\u00e5 personens karakter og situasjonens kontekst, kan regler og konsekvenser fortsatt v\\u00e6re relevante som deler av vurderingen (s. 265). Pr\\u00f8v \\u00e5 nyansere dette poenget, slik at det fremkommer at dydsetikken ikke avviser regler eller konsekvenser fullstendig, men at fokuset prim\\u00e6rt er p\\u00e5 personens karakter og hva som er den beste handlingen i den gitte situasjonen.\\\"\\n}\\n]\""
