[[questions.answers.feedback.testfeedback]]
name = "Definisjon av dyd"
passed = true
mark = 1
description = "Svarer studenten på hva en dyd er i tråd med dydsetikken?"
resultat = "Definisjonen av dyd som et positivt karaktertrekk som er moralsk verdifullt og fører til handlinger er god. Du kunne imidlertid presisere at en dyd ikke bare er et trekk, men en stabil disposisjon eller tilbøyelighet (hexis) – en måte å være på som gjennomsyrer handlingene våre over tid (se Aristoteles). Dyd er også knyttet til det å fungere godt (arete) i forhold til det som karakteriserer mennesket som art."

[[questions.answers.feedback.testfeedback]]
name = "Sammenheng mellom dyd og moralsk handling"
passed = true
mark = 1
description = "Forklarer studenten hvordan dydene er relatert til god moralsk handling?"
resultat = "Du peker på en viktig sammenheng: dyder fører til handlinger. Men husk at i dydsetikken er det ikke nok å bare utføre enkelte gode handlinger – man må handle av rett grunn, med rett følelse og i lys av praktisk visdom (fronesis). En god moralsk handling er den en dydig person ville valgt, utført slik en dydig person ville utført den. Vurder å utdype hvordan dyden former personens væremåte, ikke bare enkeltvalg."

