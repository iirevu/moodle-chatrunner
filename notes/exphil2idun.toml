resultat = "Her mangler det! 'Mot' og 'rettferdighet' er klassiske kardinaldyder som som regel omtales i Tenk! (sammen med måtehold og visdom). Oppgaven ber spesifikt om eksempler på dyder som IKKE står i boken. Tenk på mer moderne eller kontekstspesifikke dyder som: autentisitet, tålmodighet, ydmykhet, medfølelse (karuna), nøysomhet, eller profesjonelle dyder som lojalitet, pålitelighet eller faglig dyktighet. Alternativt kan du trekke inn dyder fra andre kulturer, som 'ubuntu' (sørafrikansk fellesskapsdyd) eller 'filia' (vennskap som dyd hos Aristoteles, men ofte nedtonet i moderne lærebøker)."

