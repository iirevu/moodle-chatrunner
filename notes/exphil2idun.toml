gpt_svar = "\"[\\n  {\\n    \\\"testName\\\": \\\"Definisjon av dyd\\\",\\n    \\\"description\\\": \\\"Studenten gir en n\\u00f8yaktig og helhetlig definisjon av hva en dyd er, inkludert at det handler om karaktertrekk som former personen og dens handlinger.\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Godt \\u2013 studenten beskriver at dyder er \\u00abgode karaktertrekk som former den man er og hvordan man handler\\u00bb, noe som er sentralt i dydsetikken (s. 258). Det viser forst\\u00e5else for at dyder er rotet i personens helhet, ikke bare isolerte handlinger.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Dydens forhold til moral og l\\u00e6ring\\\",\\n    \\\"description\\\": \\\"Studenten nevner at moral er noe vi l\\u00e6rer gjennom erfaring og at dyder utvikles over tid.\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Godt \\u2013 studenten understreker at dyder ikke er innf\\u00f8dte, men utvikles gjennom erfaring, noe som er et viktig poeng i dydsetikken (Antonsen et al., 2023, s. 258).\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Dydens sentrale rolle i vurdering av handlig\\\",\\n    \\\"description\\\": \\\"Studenten forklarer at handlinger vurderes som moralske ut i fra de dydene de uttrykker og i hvilken grad de er i samsvar med den utviklede karakteren.\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Godt \\u2013 studenten markerer at \\u00abhandlinger som er i samsvar med dydene vil v\\u00e6re moralsk riktige\\u00bb, noe som tilsvarer dydsetikkkens handlingsperspektiv (s. 258).\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Kontekstualisering av moral\\\",\\n    \\\"description\\\": \\\"Studenten vektlegger at dydsetikken ser p\\u00e5 handlinger i forhold til den akt\\u00f8rens liv og situasjon, ikke som isolerte regelbrudd eller \\u2013overtrdelser.\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Godt \\u2013 studenten peker p\\u00e5 at sp\\u00f8rsm\\u00e5let om gode handlinger m\\u00e5 \\u00abses i sammenheng med den moralske akt\\u00f8rens liv og situasjon\\u00bb, noe som skiller dydsetikken fra f.eks. pliktestikken.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Eksempel p\\u00e5 dyd med konkrete handlinger\\\",\\n    \\\"description\\\": \\\"Studenten gir ett eller flere eksempler p\\u00e5 en dyd (f.eks. medf\\u00f8lelse) og forklarer hvordan den uttrykkes i praktisk handling.\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Godt \\u2013 eksemplet med medf\\u00f8lelse og handlingen \\u00ab\\u00e5 sp\\u00f8rre vennen hvordan de har det og lytte\\u00bb er et tydelig og relevant eksempel p\\u00e5 hvordan en dyd kan manifestere seg i handling.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Refleksjon over at dyder er mer enn \\u00abpositive egenskaper\\u00bb\\\",\\n    \\\"description\\\": \\\"Studenten tydeliggj\\u00f8r at dyder er mer enn abstrakte eller isolerte positive egenskaper; de er dynamiske, former identitet og veiledende for handling.\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Godt \\u2013 studenten starter med at \\u00abdyder ikke er bare positive egenskaper\\u00bb, noe som viser at den reflekterer over at dyder er integrerte, utviklede og handlingsveiledende trekk \\u2013 ikke bare beskrivelser av god karakter.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Eksempler p\\u00e5 dyder utenfor *Tenk!*-boken\\\",\\n    \\\"description\\\": \\\"Studenten gir minst ett eksempel p\\u00e5 en dyd som ikke er nevnt i *Tenk!*-boken (f.eks. tapperhet, tillskot, tross, hederlighet, visdom, selvtillit, oppriktighet, t\\u00e5lmodighet, respekt, etc.).\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Mangler \\u2013 studenten nevner kun \\u00abmedf\\u00f8lelse\\u00bb, som sandsynligvis er et av eksemplene i *Tenk!*-boken (ikke nevnt i den gitte teksten, men gitt i pensumoversikten p\\u00e5 forh\\u00e5nd). Et slikt eksempel b\\u00f8r erstattes eller suppleres med en dyd som er tydelig utenfor pensumheftet.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Differensiering mellom dyder, regler og konsekvenser\\\",\\n    \\\"description\\\": \\\"Studenten antyder eller uttrykkelig skiller dydsetikk fra regel- eller konsekvensetikk (f.eks. \\u00abikke bare \\u00e5 f\\u00f8lge regler\\u00bb eller \\u00abikke bare \\u00e5 maksimere nyttighet\\u00bb).\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Ikke tilstede \\u2013 studenten nevner ikke at dydsetikken skiller seg fra andre etiske teorier, f.eks. at den ikke fokuserer p\\u00e5 regler (kategorisk imperativ) eller konsekvenser (nytteetikk), men p\\u00e5 karakteren bak handlingen.\\\"\\n  }\\n]\""
