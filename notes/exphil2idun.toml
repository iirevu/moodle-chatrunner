gpt_svar = "\"[{\\n    \\\"testName\\\": \\\"Definisjon av dyd\\\",\\n    \\\"description\\\": \\\"Svarer studenten p\\u00e5 hva en dyd er?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Du har begynt \\u00e5 beskrive hva en dyd er, men definisjonen kunne v\\u00e6rt tydeligere. If\\u00f8lge pensum er en dyd et positivt karaktertrekk som disponerer oss til \\u00e5 handle p\\u00e5 bestemte m\\u00e5ter (s. 265). Pr\\u00f8v \\u00e5 formulere en mer presis definisjon basert p\\u00e5 dette. Eksempel: \\u00abEn dyd er et stabilt karaktertrekk eller egenskap som gj\\u00f8r at vi handler, f\\u00f8ler og tenker p\\u00e5 en god m\\u00e5te i ulike situasjoner.\\u00bb\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Dydsetikkens kjerne\\\",\\n    \\\"description\\\": \\\"Forklarer studenten hva dydsetikken g\\u00e5r ut p\\u00e5?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Du nevner at dydsetikken ikke legger vekt p\\u00e5 moralske regler eller konsekvenser, noe som er riktig. Men hva legger den vekt p\\u00e5 i stedet? If\\u00f8lge pensum handler dydsetikken om \\u00abhvilken person jeg \\u00f8nsker \\u00e5 v\\u00e6re\\u00bb (s. 265). Utdyp dette ved \\u00e5 si at dydsetikken fokuserer p\\u00e5 personens karakter og situasjonens unike krav, ikke p\\u00e5 universelle regler eller konsekvenser.\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Sammenheng mellom dyder og moralsk handling\\\",\\n    \\\"description\\\": \\\"Forklarer studenten hvordan dyder henger sammen med moralsk handling?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Du skriver at det handler om \\u00e5 \\u00abhandle riktig ut fra situasjonen\\u00bb, men du forklarer ikke godt nok hvordan dyder f\\u00f8rer til god moralsk handling. If\\u00f8lge dydsetikken er en handling moralsk god n\\u00e5r den utf\\u00f8res av en person med de rette dydene \\u2013 for eksempel at en modig person handler modig i en vanskelig situasjon. Dydene gj\\u00f8r at vi intuitivt vet hva som er rik