[[questions.answers.feedback.testfeedback]]
name = "Definisjon av dyd"
passed = true
mark = 1
description = "Studenten skal gi en korrekt definisjon av dyd som en positiv karakteregenskap eller et disposisjonstrekk som gjør det mulig å handle på en god måte."
resultat = "God definisjon: «Dyd er positive karaktertrekk eller egenskaper som disponerer oss til å handle på bestemte måter» (Antonsen et al. s.\u202f265)."

[[questions.answers.feedback.testfeedback]]
name = "Kobling mellom dyd og moralsk handling i dydsetikken"
passed = false
mark = 1
description = "Studenten skal forklare at dydsetikken fokuserer på hvilken type person man ønsker å være, og at moralske handlinger er resultatet av å utvikle og uttrykke dydene, ikke av regler eller konsekvenser."
resultat = "Du har blandet sammen dydsetikk med situasjonsbasert etikette. Dydsetikken ser på handlingen som et uttrykk for den gode karakteren, ikke på hva som «fører til» bestemte konsekvenser i en gitt situasjon. Du bør utdype at handlingen blir god fordi den springer ut fra en dydig person, ikke fordi den passer til situasjonen."

[[questions.answers.feedback.testfeedback]]
name = "Presisering av at dydsetikken ikke er situasjonsrelativ"
passed = false
mark = 1
description = "Studenten skal vise at dydsetikken ikke hevder at dyder kan endre fra situasjon til situasjon på samme måte som regler kan, men at en dydig person vil ha stabile disposisjoner som veileder handlingene."
resultat = "Du hevder at «i en annen situasjon kan det være en dyd å ikke si fra dersom noen stjeler», noe som gir inntrykk av at dyder er kontekst‑avhengige. Dette er en misforståelse. En dydig person vil fortsatt ha e.g. ærlighet som en stabil egenskap; hvordan den manifesteres kan variere, men dyden selv er ikke relativ."

[[questions.answers.feedback.testfeedback]]
name = "Korrekt bruk av kildehenvisninger"
passed = true
mark = 1
description = "Studenten skal bruke parenteser med forfatter og sidetall der relevant, og unngå å oppgi feil sidetall eller manglende kilde."
resultat = "Kildehenvisningen til Antonsen et al. s.\u202f265 er korrekt. Ingen andre kilder er benyttet – dette er i orden for denne oppgaven."

[[questions.answers.feedback.testfeedback]]
name = "Oppgavekrav: Eksempler på dyder utenfor *Tenk!*‑boken"
passed = false
mark = 1
description = "Studenten skal nevne minst én dyd som ikke er med i læreboken *Tenk!* (for eksempel mot, tålmodighet, ydmykhet, rettferdighet)."
resultat = "Du har kun nevnt «omsorgsfull» og «generøs», som begge kan finnes i *Tenk!*‑boken. Du mangler eksempler på dyder som ikke står i boken, f.eks. mot, tålmodighet eller ydmykhet."

[[questions.answers.feedback.testfeedback]]
name = "Eksempel på anvendelse av dyd i konkret situasjon"
passed = true
mark = 1
description = "Studenten skal gi et konkret eksempel som tydelig illustrerer hvordan en dyd påvirker handlingen, uten å bruke en motsatt dyd i samme situasjon."
resultat = "Eksempelet med å si fra om tyveri viser hvordan en dyd (ærlighet/rettferdighet) kan lede til handling. Det er et greit konkret eksempel."

[[questions.answers.feedback.testfeedback]]
name = "Språklig klarhet og fagterminologi"
passed = false
mark = 1
description = "Studenten skal bruke presist språk, unngå overflødige ord og bruke relevant filosofisk terminologi (f.eks. «karakter», «disposisjon», «virtu», «eudaimonia»)."
resultat = "Noen formuleringer er uklare (f.eks. «den ebstexadmtede situasjonen», «det er å handle riktig ut fra situasjon»). Prøv å bruke fagterminologi som «eudaimonia» eller «virtu» for å styrke argumentasjonen."

