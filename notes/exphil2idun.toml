[[questions.answers.feedback.testfeedback]]
name = "Definisjon av dyd"
passed = true
mark = 1
description = "Gi en definisjon av hva en dyd er, basert på teksten og virtueetikken."
resultat = "En dyd er et positivt karaktertrekk som anses for å være moralsk verdifullt, som fører til at vi handler på en viss måte. Dydene er ikke bare handlinger, men habituer i å handle på en viss måte, som viser moralsk værdi. Eksempel: Stå opp for noen som blir ignoreret eller gjort narr av viser både mot og rettferdighet, som er dyder som viser hvordan vi bør handle i en moralsk sammenheng."

[[questions.answers.feedback.testfeedback]]
name = "Forbindelse til god moralsk handling"
passed = true
mark = 1
description = "Gi en forklaring på hva dydene har med god moralsk handling å gjøre ifølge virtueetikken."
resultat = "Dydene har med god moralsk handling å gjøre fordi de viser hvordan vi bør handle basert på våre karaktertrekk. Dydene er ikke bare om å gjøre rett, men å vise hvordan vi bør handle i et måte som viser våre moralske værdier. Dydene er habituer i å handle på en viss måte, som fører til god moralsk handling. Eksempel: Stå opp for noen som blir ignoreret viser at vi bør handle med rettferdighet og mot, noe som er en dyd som fører til god moralsk handling."

[[questions.answers.feedback.testfeedback]]
name = "Eksempler på dyder utenfor *Tenk!*-boken"
passed = true
mark = 1
description = "Gi eksempler på dyder som ikke står i *Tenk!*-boken, ifølge virtueetikken."
resultat = "Eksempler på dyder som ikke står i *Tenk!*-boken kan være: \n1. **Honesty** (sannhet) – å si det sanne, selv om det kan være svært. \n2. **Generosity** (gjenvinnelse) – å gi noe til andre uten å vente noe tilbake. \n3. **Patience** (pålitelighet) – å vente på noe uten å bli irksom. \n4. **Loyalty** (lojalitet) – å være loyalt til venn, familie eller saker. \n5. **Humility** (humilti) – å ikke være overbeviset om seg selv, og å anerkjenne at andre har vite."

