 false, "Moralsk skjønn", "Forklarer studenten hvorfor dydsetikken krever skjønn (*phronesis*), og ikke bare regler?",], [ false, "Undervisning og dydstrening", "Nevner studenten at dyder kan trenes opp gjennom utdanning og bevisst praksis?",], [ false, "Erfaringens rolle", "Understreker studenten at dyder utvikles gjennom erfaring, ikke teori alene?",], [ false, "Målsetting og dyder", "Kobler studenten dyder til meningsfylte mål i livet?",], [ false, "Tryggetest", "Gjør studenten rede for hvordan en dyd som 'trygghet' (ikke nevnt i pensum) kan være moralsk verdifull i visse sammenhenger?",], [ false, "Bruk av 'dårlige dyder' som moteksempel", "Bruker studenten 'dårlige' egenskaper eller laster for å belyse hva dyder *ikke* er?",], [ false, "Metaetisk perspektiv", "Nevner studenten noe om dydsetikkens syn på *hva moral er* (metaetikk)?",], [ false, "Robusthet", "Gir studenten eksempler på dyder som fremmer robusthet eller utholdenhet?",], [ false, "Dydsetikk og samfunnsendring", "Diskuterer studenten hvordan kollektive dyder kan bidra til samfunnsendring (f.eks. solidaritet i kampen for rettferdighet)?",], [ false, "Automatisering og skjønn", "Reflekterer studenten over utfordringene med å programmere 'dyder' inn i kunstig intelligens, gitt dydsetikkens krav om skjønn?",], [ false, "Oppgaveforståelse", "Har studenten svart på alle spørsmål i oppgaveteksten?",], [ false, "Akademisk innsiktsnivå", "Er svarframstillingen på et nivå som viser forståelse og refleksjon som passer for et introduksjonskurs i filosofi/etik?",], [ false, "Inviterende tone", "Er svaret formulert slik at det engasjerer leseren og inviterer til videre tenkning?",], [ false, "Eksemplifisering av teoretiske begreper", "Bruker studenten eksempler til å konkretisere abstrakte begreper som skjønn, karaktertrekk eller moralsk aktør?",], [ false, "Vekt på handling", "Fokuserer studenten på hvordan dyder *uttrykkes i handling*, ikke bare som abstrakte gode egenskaper?",], [ false, "Selvkritikk", "Viser studenten evne til selvkritikk og refleksjon over egne eksempler eller argumenter?",], [ false, "Terminologi", "Bruker studenten relevante filosofiske termer på en presis måte?",], [ false, "Originalitet i eksemplifisering", "Er studentenes egne eksempler originale, eller er de gjenbruk fra forelesninger/tekster uten videre bearbeiding?",], [ false, "Sidenummer og referanser", "Henviser studenten til relevante sider i pensum?",], [ false, "Hensyn til motforestillinger", "Går studenten i dialog med potensielle motforestillinger mot dydsetikken (f.eks. relativisme)?",], [ false, "Hierarki av dyder", "Diskuterer studenten om noen dyder er viktigere enn andre? Finnes det 'hoveddyder'?",], [ false, "Relasjonelle dyder", "Tar studenten opp dyder som dreier seg om relasjoner til andre (f.eks. vennlighet, tilgivelse, tillit)?",], [ false, "Beregnende dyder", "Diskuterer studenten om noen dyder har elementer av beregning, selv om dydsetikken ikke er ren konsekvensetikk?",], [ false, "Dyder og skam", "Forklarer studenten hvordan skam (i moderat form) kan spille en positiv rolle i dannelsen av dyder?",], [ false, "Dyd og vold", "Reflekterer studenten over dyder som kommer i spill i ekstreme situasjoner, som krig eller katastrofer?",], [ false, "Dydsetikkens normative kraft", "Forklarer studenten hvorfor dydsetikk regnes som en *normativ* etisk teori?",], [ false, "Kvalitative skiller mellom handlinger", "Differensierer studenten mellom typer handlinger — slik at ikke alle 'gode' handlinger stemples likt?",],]
