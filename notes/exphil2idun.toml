[[questions]]
question = "Hva er en dyd, og hva har dydene med god moralsk handling å gjøre,\nifølge dydsetikken? Gi eksempler på dyder som ikke står i\n*Tenk!*-boken.xa0\n"
[[questions.answers]]
ans = "Dyder er ikke bare positive egenskaper. En dyd er gode\nkaraktertrekk som former den man er og hvordan man handler.\nMoral er noe vi lærer gjennom erfaring, og som innebærer at vi\nutvikler dydige karaktertrekk over tid. Et sentralt poeng for\ndydsetikken er at spørsmålet om gode handlinger må ses i\nsammenheng med den moralske aktørens liv og situasjon (Antonsen\net al., 2023, s. 258). Det vil si at handlinger som er i samsvar\nmed dydene vil være moralsk riktige og gode eller dårlig og\ngalt.xa0Et eksempel på en dyd kan være medfølelse. Et eksempel på\ndette i praksis- at man legger merke til at en venn har det\ndårlig og kan virke nedfor. En god dyd ville da vært å spurt\nvennen hvordan de har det og lyttet etter det vedkommende har på\nhjertet.xa0\n"
