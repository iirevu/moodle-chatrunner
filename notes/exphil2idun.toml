name = "Eksempler_på_dyder_utenfor_Tenk"
passed = false
mark = 1
description = "Studenten gir minst ett eksempel på en dyd som ikke er nevnt i *Tenk!* (f.eks. tålmodighet, oppriktighet, humør, taktfullhet, uselviskhets, etc.)."
resultat = "Du nevner to dyder – mot og rettferdighet – men disse er antagelig nevnt i *Tenk!*-boken (de er klassiske dyder i Aristoteles-tradisjonen, som *Tenk!* bygger på). For å fullføre oppgaven, bør du nevne minst én ekstra dyd som ikke er i *Tenk!*, for eksempel: **tålmodighet**, **oppriktighet**, **taktfullhet**, **humør**, eller **genersomhet**. Dette viser at du forstår at dyder er en mengde – ikke kun de store, klassiske."

[[questions.answers.feedback.testfeedback]]
name = "Tilnærming_til_dydsetikkens_hovedidé"
passed = false
mark = 1
description = "Studenten forstår at dydsetikken fokuserer på *hvem vi er* (karakter) snarere enn kun *hvordan vi handler* (regler eller konsekvenser)."
resultat = "Det er ikke helt tydelig om du tar stilling til hvorfor dydsetikken skiller seg fra andre teorier (som handlingsetikk eller konsekvensetikk). En viktig del av dydsetikken er at den starter fra *hvem en er* – altså hvilke dyder en har innarbeidet – og derfra forstår en hvordan en handler. Du beskriver hvordan dyder fører til handling, men kunne tydeliggjort at det er *karakteren* som er utgangspunktet, ikke regler eller konsekvenser."

[[questions.answers.feedback.testfeedback]]
name = "Språklig_klarhet_og_fullstendighet"
