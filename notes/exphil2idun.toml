resultat = "Du bruker eksempelet fra Victor Hugo på en måte som demonstrerer god forståelse. Ved å vise at ulike dyder (omsorg/ansvar vs. ærlighet) kan komme i konflikt, illustrerer du presist det som i pensum beskrives som en styrke – at dydsetikken evner å fange moralske dilemmaer – men som kritikere mener er en svakhet (vaghet). Referansen er riktig plassert."

