[[questions.answers.feedback.testfeedback]]
name = "Forståelse av dydsetikkens kjerneprinsipper"
passed = true
mark = 1
description = "Kan du forklare hva dydsetikk fokuserer på, og hvordan det skiller seg fra andre etikkteorier?"
resultat = "Dydsetikk fokuserer på utvikling av karakter og moralisk vits, ikke bare på konsekvenser eller regler. Det er omfattende av personens oppførsel og hvordan de søker å leve i samsyn med verdier som lykke (eudaimonia). Dette skiller seg fra konsekventetikk (fokus på resultat) og deontologisk etikk (fokus på regler)."

[[questions.answers.feedback.testfeedback]]
name = "Behandle av kontraintuitivitet"
passed = true
mark = 1
description = "Kan du forklare hvorfor dydsetikk kan virke kontraintuitiv i praktiske situasjoner, og hvordan det kan løses?"
resultat = "Dydsetikk kan virke kontraintuitiv fordi det ikke alltid gir økonomisk eller økologisk resultater. For eksempel, Nelson Mandelas handlinger førte til vanskelige konsekvenser, men det er omfattende av hans karakter og langvarig lykke. Dette kan løses ved å fokusere på hva som er viktig for personen, ikke bare på hva som er logisk eller praktisk. Det er også viktig å forstå at dydsetikk ikke er omfattende av effektivitet, men av personens oppførsel og hvordan de søker å leve i samsyn med verdier som lykke."

[[questions.answers.feedback.testfeedback]]
name = "Forståelse av lykke (eudaimonia)"
passed = true
mark = 1
description = "Kan du forklare hva eudaimonia er, og hvordan det relaterer til dydsetikk?"
resultat = "Eudaimonia er det økonomiske og økologiske livet som oppstår når en lever i samsyn med verdier. Det er ikke bare omfattende av lykke i enkelte momenter, men av en langvarig og sammenhengende opplevelse av lykke. Dydsetikk er omfattende av utvikling av karakter og søker å hjelpe personer å leve i samsyn med verdier som lykke, selv om det kan føre til vanskelige konsekvenser. Det er også viktig å forstå at eudaimonia ikke nødvendigvis er det samme som lykke i enkelte momenter, men en mer kompleks opplevelse."


