[[questions.answers]]
ans = "Jeg er nokså enig i denne innvendingen. Dydsetikken gir nemlig\ningen fasit på akkurat hva som er ansett som dydig i en\nsituasjon, og det er derfor opp til enhver å vurdere dette selv.\nI eksempelet gitt i Tenk! Fra Victor Hugo sin roman De elendige\nblir valget Jean Valjeans tatt ansett som dydig med tanke på at\nhan er omsorgsfull og ansvarsfull ovenfor sin familie (Antonsen\net al., 2025, s.258-259). Samtidig kan man argumentere at det\nhadde vært mer dydig av han å skaffe maten på en mer ærlig måte\nenn tyveri. I tillegg til at dydsetikken er preget av menneskets\nsubjektive perspektiv, er det ikke alltid like lett i praksis.\nDet mest dydige valget er ikke alltid det som frister mest,\neller det som virker til å ha det beste utfallet.\n"
