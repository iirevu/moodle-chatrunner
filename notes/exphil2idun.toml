gpt_svar = "\"[\\n  {\\n    \\\"testName\\\": \\\"Tolkning av sp\\u00f8rsm\\u00e5let (Anvendbarhet vs. Lykke)\\\",\\n    \\\"description\\\": \\\"Vurderer om studenten svarer p\\u00e5 om etikken er vanskelig \\u00e5 *anvende* (handle etter), eller om det handler om konsekvensene av \\u00e5 v\\u00e6re etisk (lykke/lidelse).\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Feilretning i argumentasjonen: Svaret tolker 'vanskelig \\u00e5 anvende i praksis' som om det betyr at det \\u00e5 v\\u00e6re dydig f\\u00f8rer til motgang og ulykke (f.eks. Mandela i fengsel). Oppgaven sp\\u00f8r imidlertid om etikken gir oss tilstrekkelig veiledning til \\u00e5 vite *hvordan* vi skal handle i moralske dilemmaer (handlingsanvisning), ikke om det er krevende \\u00e5 v\\u00e6re 'god'. Studenten forveksler alts\\u00e5 utfordringen ved \\u00e5 *v\\u00e6re* dydig med utfordringen ved \\u00e5 *bruke* dydsetikken som verkt\\u00f8y for beslutningstaking.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Forst\\u00e5else av innvendingen\\\",\\n    \\\"description\\\": \\\"Sjekker om studenten identifiserer kjernen i kritikken mot dydsetikken (manglende konkrete regler).\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Manglende identifikasjon av problemet: Den klassiske innvendingen mot dydsetikken er at den ofte er vag og situasjonsavhengig, og at den ikke gir klare 'kj\\u00f8reregler' eller lover i samme grad som pliktetikk (Kant) eller utilitarisme (Mill), noe som kan gj\\u00f8re det vanskelig \\u00e5 vite n\\u00f8yaktig hva man skal gj\\u00f8re i en gitt situasjon. Svaret tar ikke tak i dette, men diskuterer heller sammenhengen mellom dyd og livskvalitet.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Relevans av eksempelet (Mandela)\\\",\\n    \\\"description\\\": \\\"Vurderer om eksempelet brukes for \\u00e5 belyse anvendelighet eller egenskaper ved dyder.\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Eksempelet brukes for \\u00e5 illustrere en annen pointe: Mandela-eksempelet brukes her for \\u00e5 vise at dyd (mot) ikke n\\u00f8dvendigvis f\\u00f8rer til materiell lykke, eller at lykke kan defineres bredere. Dette er en relevant diskusjon i dydsetikken (eudaimonia), men det svarer ikke p\\u00e5 om det var *vanskelig for Mandela \\u00e5 anvende* dydsetikken for \\u00e5 ta beslutningen om \\u00e5 bli aktivist.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"H\\u00e5ndtering av motargumenter (Phronesis)\\\",\\n    \\\"description\\\": \\\"Vurderer om studenten nevner l\\u00f8sningen p\\u00e5 problemet (praktisk klokskap/fornuft).\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Manglerelement: For \\u00e5 im\\u00f8tekomme innvendingen om at dydsetikken er vanskelig \\u00e5 anvende, b\\u00f8r et godt svar dr\\u00f8fte Aristoteles' begrep *phronesis* (praktisk klokskap). Dette er n\\u00f8kkelen som skal hjelpe oss \\u00e5 finne det gyldne midtpunktet i hverdagslige situasjoner. Ved \\u00e5 utelate dette, svarer studenten bare p\\u00e5 halvparten av problemstillingen (at det er vanskelig), uten \\u00e5 veie det mot verkt\\u00f8yene etikken faktisk gir.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Konklusjon og standpunkt\\\",\\n    \\\"description\\\": \\\"Sjekker om studenten tar et klart standpunkt basert p\\u00e5 analysen.\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Studenten tar et standpunkt ('Ja, noen ganger...'), men konklusjonen er knyttet til livsbetingelser for dydige mennesker, ikke til metodisk anvendbarhet. For \\u00e5 forbedre svaret m\\u00e5 studenten omdirigere 'Ja/Nei' til \\u00e5 gjelde om man har nok verkt\\u00f8y til \\u00e5 handle moralsk riktig, ikke om det er behagelig \\u00e5 handle moralsk riktig.\\\"\\n  }\\n]\""
