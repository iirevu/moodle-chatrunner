ks. \\u00abdu skal ikke lyve\\u00bb), mens konsekvensetikken vurderer handlinger ut fra resultatet (f.eks. \\u00abhva gir mest lykke?\\u00bb). Dydsetikken sp\\u00f8r derimot: \\u00abHva ville en dydig person gjort her?\\u00bb Presiser denne forskjellen i svaret ditt.\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Konkretisering av d\\u00f8me (stjelingssituasjon)\\\",\\n    \\\"description\\\": \\\"Er eksempelet med tyveri godt nok konkretisert?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Eksemplet ditt med tyveri er lovende, men det er litt vagt. Tenk gjennom: *Hva er forskjellen* p\\u00e5 situasjonen der det er riktig \\u00e5 si fra, og der det er riktig \\u00e5 tie? Kanskje det er riktig \\u00e5 si fra hvis tyven er en fremmed som stjeler fra butikken, mens det er riktig \\u00e5 tie hvis en sulten person stjeler mat? Slike detaljer viser at du virkelig har forst\\u00e5tt dydsetikkens situasjonsavhengighet.\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Anvendelse av dydene\\\",\\n    \\\"description\\\": \\\"Forklarer studenten hvordan dyder *anvendes* i praksis?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Du viser til handling ut fra situasjonen, men det er uklart hvordan dydene *faktisk* hjelper oss \\u00e5 handle moralsk. If\\u00f8lge dydsetikken skal en dydig person ha utviklet en moralsk visdom (\\u00abfronesis\\u00bb) som gj\\u00f8r at man intuitivt vet hva som er riktig. For eksempel vil en \\u00e6rlig person automatisk vite n\\u00e5r det er riktig \\u00e5 fortelle sannheten \\u2013 selv om det kan f\\u00f8re til ubehag. Pr\\u00f8v \\u00e5 beskrive hvordan dydene gir slik praktisk veiledning.\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Klarhet og struktur\\\",\\n    \\\"description\\\": \\\"Er svaret godt strukturert og lett \\u00e5 f\\u00f8lge?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Svarene dine inneholder mye godt stoff, men noe av det er litt rotete og vanskelig \\u00e5 f\\u00f8lge. Pr\\u00f8v \\u00e5 