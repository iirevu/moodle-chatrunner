llgodt liv (Antonsen et al., s. 264). Uten disse kan man ikke ut\\u00f8ve dydene fullt ut (f.eks. er det vanskelig \\u00e5 v\\u00e6re gener\\u00f8s uten noe \\u00e5 gi bort). Pr\\u00f8v \\u00e5 nevne konkrete eksempler p\\u00e5 ytre goder som m\\u00e5 til.\\\"  \\n  },  \\n  {  \\n    \\\"testName\\\": \\\"Phronesis (praktisk visdom)\\\",  \\n    \\\"description\\\": \\\"Vurderer om svaret nevner phronesis som n\\u00f8dvendig for \\u00e5 realisere dyden\\\",  \\n    \\\"iscorrect\\\": false,  \\n    \\\"resultat\\\": \\\"ikke oppfylt. Du mangler omtale av praktisk visdom (phronesis). If\\u00f8lge Aristoteles er dyd ikke nok i seg selv; man trenger ogs\\u00e5 phronesis for \\u00e5 vite hvordan man skal handle dydig i konkrete situasjoner. Phronesis er den intellektuelle dyden som lar oss finne det rette middelveien (mesotes) mellom to ytterligheter. Dette er sentralt for forst\\u00e5elsen av forholdet mellom dyd og lykke.\\\"  \\n  },  \\n  {  \\n    \\\"testName\\\": \\\"Livet i sin helhet (bios teleos)\\\",  \\n    \\\"description\\\": \\\"Vurderer om svaret nevner at lykke m\\u00e5 m\\u00e5les over et helt liv\\\",  \\n    \\\"iscorrect\\\": false,  \\n    \\\"resultat\\\": \\\"ikke oppfylt. Mens du nevner \\u00ablivet som en helhet\\u00bb, utdyper du ikke Aristoteles' poeng om at eudaimonia krever en \\u00abfullstendig tid\\u00bb \\u2013 man kan ikke kalles lykkelig f\\u00f8r livet er over (\\u00e9n svalg gj\\u00f8r ikke v\\u00e5r). Du b\\u00f8r presisere at dyd m\\u00e5 ut\\u00f8ves \\u00abigjennom en hel livstid\\u00bb for \\u00e5 gi full eudaimonia.\\\"  \\n  },  \\n  {  \\n    \\\"testName\\\": \\\"Dyd som karakter (hexis) vs. handling\\\",  \\n    \\\"description\\\": \\\"Vurderer om svaret skiller mellom \\u00e5 ha en dyd (disposisjon) og \\u00e5 ut\\u00f8ve den\\\",  \\n    \\\"iscorrect\\\": false,  \\n    \\\"resultat\\\": \\\"delvis oppfylt. Du skriver at dyd er \\u00abn\\u00f8kkelen\\u00bb, men du kan styrke svaret ved \\u00e5 presisere at dyd er en innarbeidet disposisjon (hexis) som m\\u00e5 komme til uttrykk i handling. Det er ikke nok \\u00e5 \\u00abha\\u00bb dydene; lykken ligger i den aktive ut\\u00f8velsen av dem (energeia kat' aret\\u0113n).\\\"  \\n  },  \\n  {  \\n    \\\"testName\\\": \\\"Referansebruk og kildehenvisning\\\",  \\n    \\\"description\\\": \\\"Vurderer om svaret bruker Antonsen et al. (2023) p\\u00e5 en tydelig m\\u00e5te\\\",  \\n    \\\"iscorrect\\\": true,  \\n    \\\"resultat\\\": \\\"oppfylt. Du henviser riktig til Antonsen et al. (2023, s. 264) og integrerer henvisningene naturlig i teksten. Vurder om du ogs\\u00e5 kan trekke inn andre sider fra pensum (f.eks. s. 265\\u2013266) for \\u00e5 styrke analysen av aktivitetsaspektet ved eudaimonia.\\\"  \\n  },  \\n  {  \\n    \\\"testName\\\": \\\"Forholdet mellom dyd og lykke (presisering)\\\",  \\n    \\\"description\\\": \\\"Vurderer om svaret konkret forklarer HVORFOR dyd f\\u00f8rer til lykke\\\",  \\n    \\\"iscorrect\\\": false,  \\n    \\\"resultat\\\": \\\"trenger utdyping. Du etablerer at dyd er n\\u00f8dvendig og viktig, men du forklarer ikke logikken i hvorfor dyd f\\u00f8rer til lykke. Aristoteles' argument er at menneskets ergon (funksjon) er rasjonell aktivitet, og n\\u00e5r vi utf\\u00f8rer denne funksjonen vel (dvs. med dyd), oppn\\u00e5r vi eudaimonia. Tilf\\u00f8r denne teleologiske forklaringen: lykken er \\u00e5 realisere v\\u00e5r artsspesifikke funksjon p\\u00e5 en utmerket m\\u00e5te.\\\"  \\n  }  \\n]\""
