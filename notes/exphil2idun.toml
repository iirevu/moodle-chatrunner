med andre ord en del av det \\u00e5 leve godt. Studenten m\\u00e5 klargj\\u00f8re at dyd og lykke er tett knyttet sammen p\\u00e5 denne m\\u00e5ten. Et eksempel kan v\\u00e6re at \\u00e5 v\\u00e6re modig ikke bare hjelper oss i vanskelige situasjoner, men ogs\\u00e5 er en del av et liv hvor vi trives (jf. s. 264).\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Gir studenten eksempler p\\u00e5 hva et vellykket liv inneb\\u00e6rer?\\\",\\n    \\\"description\\\": \\\"Inkluderer studenten eksempler p\\u00e5 hva dydsetikken kan mene med et vellykket liv?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Studenten b\\u00f8r konkretisere hva dydsetikken mener med et 'vellykket liv' ut over \\u00e5 v\\u00e6re dydig. Pensumteksten nevner eksempelvis at et vellykket liv kan handle om \\u00e5 ha gode relasjoner eller delta i meningsfulle aktiviteter (s. 264). Dette viser at lykke i dydsetikken er noe mer omfattende enn individuell nytelse eller velv\\u00e6re.\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Skiller studenten mellom dydsetikkens syn og andre etiske teorier?\\\",\\n    \\\"description\\\": \\\"Forklarer studenten hvordan dydsetikkens syn p\\u00e5 forholdet mellom dyd og lykke skiller seg fra andre teorier, f.eks. utilitarisme eller pliktetikk?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"For \\u00e5 vise god forst\\u00e5else b\\u00f8r studenten ogs\\u00e5 kort forklare *hva dydsetikken ikke er*. Mens utilitarisme fokuserer p\\u00e5 lykke som maksimal nytelse eller gode konsekvenser, og pliktetikk p\\u00e5 \\u00e5 f\\u00f8lge regler, er dydsetikken opptatt av *karakter* og *levem\\u00e5te*. Lykke oppn\\u00e5s ikke ved \\u00e5 f\\u00f8lge regler eller maksimere nytte, men ved \\u00e5 utvikle og leve i tr\\u00e5d med dyder (jf. s. 264).\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Refererer studenten til relevant pensum?\\\",\\n    \\\"description\\\": \\\"Bruker studenten pensumlitteraturen (Antonsen et al., 2025) til \\u00e5 st\\u00f8tte sine argumenter?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Studenten b\\u00f8r vise at hen har forst\\u00e5tt oppgaven ved \\u00e5 referere til pensum. I dette tilfellet er det s\\u00e6rlig Antonsen et al. (2025, s. 264) som er relevant. Det er ikke nok \\u00e5 ha generell kunnskap om dydsetikk \\u2013 studenten m\\u00e5 vise at hen kan bruke de aktuelle tekstene til \\u00e5 underbygge sine poeng.\\\"\\n},\\n{\\n    \\\"testName\\\": \\\"Er svaret strukturert og presist?\\\",\\n    \\\"description\\\": \\\"Er svarene godt strukturert og presise, eller er de vage og ufokuserte?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Et godt svar p\\u00e5 denne oppgaven b\\u00f8r v\\u00e6re tydelig og velstrukturert. Studenten b\\u00f8r f\\u00f8rst definere forholdet mellom dyd og lykke, deretter bruke eksempler og evt. begreper (som eudaimonia) for \\u00e5 utdype, og til slutt gjerne kort skille dydsetikkens syn fra andre teorier. Unng\\u00e5 vage formuleringer som 'det er et sterkt forhold mellom dyd og lykke' uten \\u00e5 utdype hva dette forholdet best\\u00e5r i.\\\"\\n}\\n]\""
