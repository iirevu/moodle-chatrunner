description = "Hva er den samlede vurderingen av studentens svar?"
resultat = "Svaret ditt er et **godt utgangspunkt**, men mangler noen sentrale elementer for å være fullgodt i forhold til oppgavens krav. Du definerer dyd på en presis måte og gir et relevant eksempel, men du:\n- **Mangler teoretisk forankring** (begrepet «dydsetikk» og dens kjennetegn).\n- **Ikke oppfyller kravet om eksempler** (dyder som ikke står i *Tenk!*-boken).\n- **Kun delvis utdyper sammenhengen** mellom dyder og moralsk handling.\n\nMed noen få justeringer (se «Fremtidig veiledning») vil svaret ditt bli mye sterkere. Dydsetikken er et fascinerende tema, og du viser allerede god forståelse av kjerneideene!"

[[questions.answers.feedback.testfeedback]]
