seskriteriet i dydsetikk: sp\\u00f8rsm\\u00e5let om hva den dydige personen ville gjort. Selv om dette ikke gir en algoritmisk fasit, gir det en prosedyre for avklaring som er mer strukturert enn ren 'subjektiv vurdering'. Dette ville nyansert bildet av praktisk anvendelighet.\\\"\\n}, {\\n  \\\"testName\\\": \\\"Sammenligning med alternativer (deontologi/konsekvensetikk)\\\",\\n  \\\"description\\\": \\\"For \\u00e5 vurdere om innvendingen er sterk, b\\u00f8r studenten kort sammenligne med om andre etiske teorier er lettere \\u00e5 anvende i praksis.\\\",\\n  \\\"iscorrect\\\": false,\\n  \\\"resultat\\\": \\\"Du nevner ikke om pliktetikk eller konsekvensetikk ville v\\u00e6rt enklere \\u00e5 anvende p\\u00e5 Jean Valjeans situasjon. For \\u00e5 vurdere om 'vanskelig \\u00e5 anvende' er en alvorlig innvending, b\\u00f8r du kort vurdere: Er Kantianske plikter enklere (hvordan h\\u00e5ndtere konflikt mellom plikter)? Er utilitarianisme enklere (krever umulige kalkulasjoner av konsekvenser)? Denne komparative tiln\\u00e6rmingen ville styrket argumentasjonen.\\\"\\n}]\""
