description = "Gjør studenten det klart at dyder kan læres og utvikles?"
resultat = "Du nevner ikke at dyder ikke er medfødte, men noe vi utvikler gjennom **praksis, vane og rollemodeller**. Aristoteles sammenlignet utvikling av dyder med å lære et håndverk: det krever tid, øvelse og veiledning. For å styrke svaret, kan du kort nevne dette aspektet."

[[questions.answers.feedback.testfeedback]]
name = "Fokus på personen vs. handlingen"
passed = false
mark = 1
description = "Gjør studenten det klart at dydsetikken fokuserer på personen bak handlingen, ikke bare handlingen i seg selv?"
resultat = "Du viser dette implisitt gjennom eksempelet (personen viser mot og rettferdighet), men du gjør det ikke eksplisitt. Dydsetikken skiller seg fra andre teorier ved å vektlegge **hvem som handler**, ikke bare **hva som gjøres**. For eksempel: Å gi penger til veldedighet kan være en god handling, men ifølge dydsetikken er det avgjørende om handlingen springer ut av en dydig karakter (f.eks. gavmildhet eller medlidenhet)."

[[questions.answers.feedback.testfeedback]]
name = "Eksempel på last (motsatsen til dyd)"
passed = false
mark = 1
description = "Bruker studenten eksempler på laster (motsatsen til dyder) for å illustrere?"
resultat = "Du nevner ikke eksempler på **laster** (de negative karaktertrekkene som står i motsetning til dyder). Aristoteles' teori om «den gylne middelveien» bygger på denne motsetningen. For eksempel:\n- Dyd: Mot. Laster: Feighet (for lite mot) og dumdristighet (for mye mot).\n- Dyd: Gavmildhet. Laster: Gjerrighet (for lite) og sløseri (for mye).\nÅ inkludere laster kan gjøre eksemplene på dyder mer konkrete og forståelige."

[[questions.answers.feedback.testfeedback]]
name = "Konsekvenser av dydsetikkens syn"
passed = false
mark = 1
description = "Diskuterer studenten kort hvilke konsekvenser dydsetikkens syn har for hvordan vi vurderer moral?"
resultat = "Du diskuterer ikke konsekvensene av dydsetikkens fokus på karakter. Noen sentrale konsekvenser kan være:\n- **Moralisk vurdering**: Vi vurderer ikke bare handlinger, men *personen* som utfører dem.\n- **Kontekstavhengighet**: Hva som regnes som en dydig handling kan variere med situasjonen (f.eks. når er det modig vs. dumdristig å konfrontere noen?).\n- **Fokus på langsiktig utvikling**: Moral handler ikke om enkeltstående valg, men om å forme en god karakter over tid.\nÅ inkludere disse punktene kan vise at du ser de bredere implikasjonene av teorien."

[[questions.answers.feedback.testfeedback]]
name = "Avrunding"
passed = false
mark = 1
description = "Avslutter studenten svaret på en god måte?"
resultat = "Svaret ditt mangler en tydelig avslutning eller konklusjon. En god avslutning kunne oppsummert kjernepoengene, reflektert over relevansen av dydsetikken, eller engasjert leseren til videre refleksjon. For eksempel:\n*«Dydsetikken minner oss om at god moral ikke bare handler om regler, men om å kultivere karaktertrekk som gjør oss i stand til å leve gode liv. Dyder som mot og rettferdighet, eller nye som omsorg og ydmykhet, er verktøy for både personlig vekst og et mer menneskevennlig samfunn.»*"

[[questions.answers.feedback.testfeedback]]
name = "Oppsummering av forbedringspunkter"
passed = false
mark = 1
description = "Hva er de tre viktigste forbedringspunktene for studenten?"
resultat = "De **tre viktigste forbedringspunktene** er:\n1. **Teoretisk forankring**: Nevn eksplisitt «dydsetikken» som teorien som forklarer sammenhengen mellom dyder og moralsk handling, og inkluder sentrale begreper (f.eks. gylne middelvei, eudaimonia).\n2. **Eksempler utenfor *Tenk!*-boken**: Bytt ut eller legg til dyder som ikke er nevnt i boken (f.eks. nysgjerrighet, omsorg, tålmodighet, ydmykhet). Gi konkrete eksempler på hvordan disse dydene kan komme til uttrykk.\n3. **Sammenhengen mellom dyder og handling**: Utdyp hvordan dydsetikken ser handlinger som et uttrykk for karakter (ikke bare regler eller konsekvenser), og hva som gjør en handling «god» ifølge denne teorien.\n\nVed å ta tak i disse punktene, vil svaret ditt bli både **mer komplett** og **mer teoretisk fundert**."

[[questions.answers.feedback.testfeedback]]
name = "Eksempel på et forbedret svar (utdrag)"
passed = false
mark = 1
description = "Viser hvordan et forbedret svar på deler av oppgaven kan se ut"
resultat = "Under følger et forbedret utdrag for å illustrere hvordan du kan utvikle svaret:\n\n*«Ifølge dydsetikken er en dyd et moralsk verdifullt karaktertrekk som former våre handlinger og vurderinger (1, s. 262). I motsetning til pliktetikken eller konsekvensialismen, spør ikke dydsetikken primært ‘hva bør jeg gjøre?’, men ‘hva slags person bør jeg være?’. En god moralsk handling springer derfor ikke ut av regler eller beregning av konsekvenser, men av en dydig karakter. For eksempel er handlingen ‘å stå opp for noen som blir mobbet’ moralsk god ikke bare fordi den er riktig i seg selv, men fordi den verdiene (f.eks. mot og rettferdighet) kommer fra en person som har utviklet disse dydene over tid.\n\n*Tenk!*-boken nevner dyder som mot, rettferdighet og ærlighet. Andre eksempler på dyder, som ikke står i boken, er **omsorg** (en sentral dyd i feministisk etikk, som handler om å respondere på andre menneskers behov) og **tålmodighet** (evnen til å holde ut i møte med motgang eller frustrasjon). Et eksempel på tålmodighet kan være en lærer som fortsetter å veilede en elev som strever, til tross for gjentatte feil. Her er handlingen ikke bare løsrevet ‘riktig’, men et uttrykk for en dyd som er utviklet gjennom praksis.*»\n\nDette eksempelet viser hvordan du kan kombinere **teoretisk forankring**, **nye eksempler** og **fokus på karakter**."

[[questions.answers.feedback.testfeedback]]
name = "Neste steg"
passed = false
mark = 1
description = "Hva er det neste steget for studenten?"
resultat = "Neste steg for deg er å:\n1. **Revidere svaret** basert på tilbakemeldingene over, spesielt punktene om teoretisk forankring og eksempler.\n2. **Utforske mer**: Les om Aristoteles’ «gylne middelvei» og hvordan dyder utvikles gjennom vane (1, s. 264-265).\n3. **Reflektere selv**: Tenk over hvilke dyder du selv verdsetter, og hvordan du kan utvikle dem i ditt eget liv.\n4. **Sammenligne med andre teorier**: Les om pliktetikk eller konsekvensialisme og noter deg hva som skiller dem fra dydsetikken.\n\nLykke til! Dydsetikken er et spennende felt som gir oss verktøy til å tenke over moral på en dypere måte – ikke bare som regler, men som en del av det å leve et godt liv."


