ydige karaktertrekk 'over tid'. Dette treffer kjernen i dydsetikkens pedagogiske dimensjon: vi blir rettferdige ved \\u00e5 handle rettferdig, etc. Vurder om du skal bruke begrepet 'etikkens pragmatiske vending' eller referere til hvordan dyder er noe vi '\\u00f8ver oss i' gjennom habituering.\\\"},{\\\"testName\\\":\\\"Kontekst og moralsk akt\\u00f8rs situasjon\\\",\\\"description\\\":\\\"Tester om svaret f\\u00e5r med at handlingene m\\u00e5 ses i lys av akt\\u00f8rens liv, situasjon og praktisk kl\\u00f8kt (phronesis)\\\",\\\"iscorrect\\\":true,\\\"resultat\\\":\\\"Oppfylt. Du refererer eksplisitt til s. 258 om at gode handlinger m\\u00e5 ses i sammenheng med 'den moralske akt\\u00f8rens liv og situasjon'. Dette er essensielt i dydsetikken. Et lite framtidig tips: Knytt dette til begrepet praktisk visdom (phronesis) \\u2013 det er denne evnen som lar oss skille dyd fra last n\\u00e5r to dyder kolliderer i en konkret situasjon (f.eks. n\\u00e5r \\u00e6rlighet utfordrer medf\\u00f8lelse).\\\"},{\\\"testName\\\":\\\"Eksempler p\\u00e5 dyder utenfor Tenk!\\\",\\\"description\\\":\\\"Tester om eksemplene p\\u00e5 dyder faktisk ikke finnes i pensumboken (Tenk!), og at studenten ikke bare bruker de fire kardinaldyder\\\",\\\"iscorrect\\\":false,\\\"resultat\\\":\\\"Sannsynligvis ikke oppfylt. Du bruker 'medf\\u00f8lelse' som eksempel. Dette begrepet (eller n\\u00e6r beslektede termer som 'medmenneskelighet' eller 'empati') er gjenstand for grundig behandling i de fleste utgaver av Tenk! i kapitlet om dydsetikk. Oppgaven ber spesifikt om dyder som *ikke* st\\u00e5r i boken. Forslag til alternativer som trolig ikke er gjennomg\\u00e5tt i detalj: t\\u00e5lmodighet, gener\\u00f8sitet/munificens, ydmykhet, n\\u00f8ysomhet, sannferdighet (ikke det samme som generell \\u00e6rlighet), eller industri/flid. Velg \\u00e9n slik dyd og forklar kort hva den inneb\\u00e6rer.\\\"},{\\\"testName\\\":\\\"Konkret praktisk eksempel\\\",\\\"description\\\":\\\"Tester om svaret gir et tydelig, konkret eksempel p\\u00e5 hvordan dyden arter seg i praksis\\\",\\\"iscorrect\\\":true,\\\"resultat\\\":\\\"Veldig godt oppfylt. Du gir et levende eksempel p\\u00e5 medf\\u00f8lelse i m\\u00f8te med en venn som har det vanskelig, og du f\\u00e5r med b\\u00e5de det \\u00e5 legge merke til (persepsjon) og det \\u00e5 handle (lytte). Dette viser at du forst\\u00e5r at dyd ikke bare er en indre f\\u00f8lelse, men en helhet av oppmerksomhet, d\\u00f8mmekraft og handling. Behold denne konkretiseringen ogs\\u00e5 n\\u00e5r du bytter til en annen dyd (som ikke er i boken)!\\\"},{\\\"testName\\\":\\\"Korrekt bruk av begreper og henvisninger\\\",\\\"description\\\":\\\"Tester om faglige begreper brukes korrekt og om henvisninger er relevante\\\",\\\"iscorrect\\\":true,\\\"resultat\\\":\\\"Bra. Du bruker den eksakte referansen (Antonsen et al., 2023, s. 258) korrekt. For \\u00e5 styrke det akademiske niv\\u00e5et kan du vurdere \\u00e5 introdusere n\\u00f8kkelbegreper som 'heksis' (karaktertilstand), 'eudaimonia' (det gode liv som m\\u00e5let med dydene) eller 'det gyldne middelvei' n\\u00e5r du diskuterer hvordan dyden balanserer mellom to laster.\\\"}]\""
