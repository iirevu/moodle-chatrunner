resultat = "Du beskriver godt at vurderingen er overlatt til den enkelte, men du mangler å introdusere begrepet 'fønesis' (praktisk visdom). I pensum (og hos Aristoteles) er ikke dette tilfeldig subjektivitet, men en opparbeidet intellektuell dyde som nettopp skal hjelpe oss å navigere slike vanskelige situasjoner. Inkludering av dette begrepet ville styrket analysen betraktelig."

