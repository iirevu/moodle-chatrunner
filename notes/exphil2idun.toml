gpt_svar = "\" [{\\n  \\\"testName\\\": \\\"test_dyd_som_karakterdisposisjon\\\",\\n  \\\"description\\\": \\\"Definerer eleven dyd som en stabil karakterdisposisjon (hexis) tilegnet gjennom erfaring/vane, ikke bare som en positiv egenskap?\\\",\\n  \\\"iscorrect\\\": false,\\n  \\\"resultat\\\": \\\"Delvis oppfylt \\u2013 Du beskriver riktig at dyd er et karaktertrekk som former personen. For \\u00e5 styrke svaret b\\u00f8r du tydeliggj\\u00f8re at det er en *stabil* disposisjon (hexis) som er ervervet gjennom gjentatt handling (tilvenning). Dette skiller dyder fra tilfeldige handlinger eller hum\\u00f8rsvingninger.\\\"\\n},\\n{\\n  \\\"testName\\\": \\\"test_forholdet_dyd_handling\\\",\\n  \\\"description\\\": \\\"Forklarer eleven forholdet mellom dyd og god handling, inkludert skillet mellom \\u00e5 handle 'av dyd' kontra 'i samsvar med dyd'?\\\",\\n  \\\"iscorrect\\\": false,\\n  \\\"resultat\\\": \\\"Delvis oppfylt \\u2013 Du skriver at handlinger i samsvar med dyder er moralsk riktige. Dette er sant, men dydsetikken vektlegger sterkt at den dyktige handler *av* dyd (av indre overbevisning), ikke bare *i samsvar med* dyd. Dydsetikken handler om '\\u00e5 v\\u00e6re' en god person, ikke bare '\\u00e5 utf\\u00f8re' riktige handlinger.\\\"\\n},\\n{\\n  \\\"testName\\\": \\\"test_phronesis\\\",\\n  \\\"description\\\": \\\"Omtaler eleven phronesis (praktisk visdom) som n\\u00f8dvendig ledd mellom dyd og handling?\\\",\\n  \\\"iscorrect\\\": false,\\n  \\\"resultat\\\": \\\"Ikke oppfylt \\u2013 Svaret mangler omtale av phronesis (praktisk visdom). Dette er avgj\\u00f8rende i dydsetikken: uten praktisk visdom kan man ikke vite hvordan dyden (f.eks. mot) skal ut\\u00f8ves i en konkret situasjon. Dydene m\\u00e5 styres av fornuft for \\u00e5 treffe riktig.\\\"\\n},\\n{\\n  \\\"testName\\\": \\\"test_eudaimonia\\\",\\n  \\\"description\\\": \\\"Forklarer eleven at dydenes form\\u00e5l er eudaimonia (menneskelig blomstring/flourishing)?\\\",\\n  \\\"iscorrect\\\": false,\\n  \\\"resultat\\\": \\\"Ikke oppfylt \\u2013 Du nevner ikke eudaimonia. If\\u00f8lge dydsetikken (Aristoteles) er dyd ikke et m\\u00e5l i seg selv, men et middel til (og del av) det gode menneskeliv (eudaimonia). Dyder hjelper oss \\u00e5 fungere optimalt som mennesker.\\\"\\n},\\n{\\n  \\\"testName\\\": \\\"test_kontekst_situasjon\\\",\\n  \\\"description\\\": \\\"Viser eleven forst\\u00e5else for at dydsetikken krever situasjonsf\\u00f8lsomhet (partikularisme)?\\\",\\n  \\\"iscorrect\\\": true,\\n  \\\"resultat\\\": \\\"Oppfylt \\u2013 Bra! Du poengterer at sp\\u00f8rsm\\u00e5let om gode handlinger m\\u00e5 ses i sammenheng med den moralske akt\\u00f8rens liv og situasjon (s. 258). Dette er et kjennetegn ved dydsetikken kontra regelbasert etikk \\u2013 handlingen m\\u00e5 tilpasses den konkrete konteksten.\\\"\\n},\\n{\\n  \\\"testName\\\": \\\"test_gyldne_middelvei\\\",\\n  \\\"description\\\": \\\"Omtaler eleven l\\u00e6ren om den gyldne middelvei (mesotes) \\u2013 at dyden ligger mellom to laster/ytterpunkter?\\\",\\n  \\\"iscorrect\\\": false,\\n  \\\"resultat\\\": \\\"Ikke oppfylt \\u2013 Du nevner ikke at hver dyd er en balanse mellom to ekstremer (for mye/for lite). For eksempel ligger mot mellom dumdristighet og feighet. Dette er sentralt for \\u00e5 forst\\u00e5 hvorfor dydsetikken krever praktisk Visdom.\\\"\\n},\\n{\\n  \\\"testName\\\": \\\"test_eksempel_utenfor_pensum\\\",\\n  \\\"description\\\": \\\"Gir eleven eksempler p\\u00e5 dyder som tydelig skiller seg fra de klassiske kardinaldyder (visdom, mot, m\\u00e5tehold, rettferdighet)?\\\",\\n  \\\"iscorrect\\\": true,\\n  \\\"resultat\\\": \\\"Oppfylt \\u2013 Medf\\u00f8lelse er et godt eksempel p\\u00e5 en dyd som typisk ikke er blant de klassisk aristoteliske kardinaldyder. Du kunne styrket svaret ved \\u00e5 forklare hvorfor dette er en stabil disposisjon, og gjerne vise hvordan den ut\\u00f8ves (gyldne middelvei mellom hardhjertethet og overdreven sentimentalitet).\\\"\\n},\\n{\\n  \\\"testName\\\": \\\"test_eksempel_som_karaktertrekk\\\",\\n  \\\"description\\\": \\\"Beskriver eleven eksempelet som et karaktertrekk (dyd), ikke bare som en enkeltst\\u00e5ende handling?\\\",\\n  \\\"iscorrect\\\": false,\\n  \\\"resultat\\\": \\\"Delvis oppfylt \\u2013 Du beskriver en dydig handling (\\u00e5 sp\\u00f8rre en venn), men kunne tydeligere forklart at medf\\u00f8lelse er et *trekk ved personen* \\u2013 en varig tendens til \\u00e5 legge merke til og bry seg om andres lidelse, som manifester seg i handlinger, men ikke er lik handlingene selv.\\\"\\n}]\""
