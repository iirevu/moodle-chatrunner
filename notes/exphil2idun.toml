\\\": \\\"Uklart/Svakt. Studenten nevner at \\\\\\\"Det mest dydige valget er ikke alltid [...] det som virker til \\u00e5 ha det beste utfallet\\\\\\\". Selv om dette er sant i praksis, er det viktig \\u00e5 v\\u00e6re tydelig p\\u00e5 at dydsetikken skiller seg fra utilitarisme ved at handlingens verdi ikke ligger i utfallet, men i om handlingen uttrykker riktig dyd. Unng\\u00e5 \\u00e5 fokusere for mye p\\u00e5 utfall n\\u00e5r du vurderer dydsetikken.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Dr\\u00f8fting (Er du enig?)\\\",\\n    \\\"description\\\": \\\"Gir studenten en begrunnelse for sin posisjon utover bare \\u00e5 si ja/nei, og vurdert de andre sidene?\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Studenten gir en klar begrunnelse for \\u00e5 v\\u00e6re enig. For \\u00e5 gj\\u00f8re svaret enda bedre (og kanskje f\\u00e5 en h\\u00f8yere karakter), kan du vurdere en bi-setning om: 'P\\u00e5 den andre siden kan en si at manglende regler gj\\u00f8r etikken mer fleksibel og menneskelig...' Dette viser at du ser kompleksiteten i innvendingen.\\\"\\n  }\\n]\""
