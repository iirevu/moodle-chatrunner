gpt_svar = "\"[\\n  {\\n    \\\"testName\\\": \\\"Forst\\u00e5else av dydsetikkens utfordringer i praksis\\\",\\n    \\\"description\\\": \\\"Studenten identifiserer en sentral kritikk mot dydsetikk (at den er vanskelig \\u00e5 anvende i praksis) og gir et relevant eksempel.\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Godtatt. Du peker p\\u00e5 en velkjent og viktig kritikk: at dydsetikk kan gi konflikter mellom dydigt handling og personlig velv\\u00e6re eller lykke \\u2013 f.eks. i tilfeller som Nelson Mandelas lidelse for rettferdighetens skyld. Dette utfordrer den tradisjonelle sammenhengen mellom dyd og lykke som Aristoteles tenkte seg til (se f.eks. Antonsen et al., 2025, s. 264).\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Refleksjon over tilpasning til moderne praksissituasjoner\\\",\\n    \\\"description\\\": \\\"Studenten viser til at dydsetikk kan v\\u00e6re vanskelig \\u00e5 anvende i virkelige, komplekse praksissituasjoner.\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Ikke tilstrekkelig. Du nevner en viktig kritikk, men g\\u00e5r ikke inn p\\u00e5 *hvordan* dydsetikk kan v\\u00e6re vanskelig \\u00e5 anvende i praksis \\u2013 f.eks. mangelen p\\u00e5 klare retningslinjer i komplekse konfliktsituasjoner, eller at dyder kan v\\u00e6re motstridende i praksis. En dyddetisk analysetekst b\\u00f8r forklare *hvorfor* praksisutfordringen er s\\u00e5 utfordrende.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Kritisk distanse til dydsetikkens idealisering av 'den dydige'\\\",\\n    \\\"description\\\": \\\"Studenten reflekterer over at dydsetikk kan forutsette ideelle forutsetninger som ikke finnes i virkeligheten.\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Ikke tilstrekkelig. Eksemplet med Mandela illustrerer lidelse og motstand \\u2013 men du nevner ikke noe om at dydsetikk ofte antar at den dydige handlingen *b\\u00f8r* velges, selv om den f\\u00f8rer til personlig tap. Det er viktig \\u00e5 tydeliggj\\u00f8re *hvordan* denne antakelsen kan gj\\u00f8re dydsetikk praktisk vanskelig: f.eks. at den ikke gir r\\u00e5d om hvordan man balanserer dyd mot egen interesse, eller hvordan man tolker dyder i komplekse sosiale kontekster.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Kapacitet til \\u00e5 bygge videre p\\u00e5 pensumkilder\\\",\\n    \\\"description\\\": \\\"Studenten bruker kilder p\\u00e5 en m\\u00e5te som viser forst\\u00e5else og kritisk refleksjon.\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Godtatt. Du henter fra Antonsen et al. (2025, s. 264) og Christensen (2008, s. 49), og setter dem i dialog med hverandre for \\u00e5 illustrere en viktig kritikk mot dydsetikkens realistiske anvendelighet. Dette er et bra tegn p\\u00e5 pensumforst\\u00e5else og kritisk lesing.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Selvrefleksjon over egen holdning til kritikken\\\",\\n    \\\"description\\\": \\\"Studenten angir klart sin egen synspunkt p\\u00e5 kritikken (er du enig? hvorfor/hvorfor ikke?).\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Ufullstendig. Oppgaven spesifikt ber om at du tar stilling til innvendingen: \\u00abEr du enig i innvencingen?\\u00bb. Du beskriver en mulig utfordring, men svarer ikke direkte p\\u00e5 sp\\u00f8rsm\\u00e5let om du selv er enig. En god tilbakemelding b\\u00f8r enten bekrefte eller avvise kritikken og gi argumentasjon for dette.\\\"\\n  }\\n]\""
