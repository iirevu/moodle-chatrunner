resultat = "Du konkluderer med at dydsetikken er vanskelig å anvede, men drøfter ikke tilstrekkelig om dette faktisk er en innvending mot teorien selv. En styrke ved dydsetikken kan nettopp være at den ikke gir lettvinte svar (i motsetning til regelbaserte systemer som kan virke rigide). Drøft om vanskeligheten skyldes teoriens svakhet eller moralens iboende kompleksitet."

