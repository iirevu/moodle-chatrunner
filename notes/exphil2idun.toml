description = "Svarer studenten på hva eudaimonia betyr i dydsetikken?"
resultat = "Du har ikke forklart hva eudaimonia er. I dydsetikken er eudaimonia ikke bare lykke som følelse, men nåden av menneskelig blomstring eller et 'vellykket liv' (1, s. 264). Prøv å utdype dette i svaret ditt, gjerne med et eksempel. Tenk på hvordan Aristoteles ser på det gode liv som noe mer enn bare glede eller velbehag."

