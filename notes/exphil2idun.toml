resultat = "Du mangler å forklare at dyder ifølge Aristoteles representerer en balanse eller middelvei mellom to ytterligheter (lasterekker). For eksempel ligger mot mellom dumdristighet (for mye) og feighet (for lite). Dette er sentralt for å forstå hvordan dydsetikken skiller mellom dyd og last – det er ikke 'mest mulig' av et positivt trekk, men 'det rette målet' i den konkrete situasjonen."

