g. Studenten sier at man \\u00abkan oppn\\u00e5 eudaimonia dersom man lever et dydig liv\\u00bb, men Aristoteles hevder at eudaimonia *er* dydig handling i henhold til fullf\\u00f8rt dyd \\u2013 alts\\u00e5 mer enn bare \\u00abdersom\\u00bb-koblingen. Det er en identifikasjonssetning: eudaimonia = aktivitet i henhold til dyd (Nikomakhos-etikk, bok X, kap. 8\\u20139).\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Nevner at eudaimonia krever hele livet \\u2013 ikke \\u00f8yeblikksvis\\\",\\n    \\\"description\\\": \\\"Studenten antyder eller nevner at eudaimonia er et langvarig tilstand \\u2013 ikke et \\u00f8yeblikk av forn\\u00f8ydhet.\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Mangler. Studenten nevner ikke at eudaimonia if\\u00f8lge Aristoteles ikke kan oppn\\u00e5s i et \\u00f8yeblikk, og krever et hele livs tid \\u2013 f.eks. at \\u00abikke en enkelt fugl eller \\u00e9n dag gj\\u00f8r en som er lykkelig\\u00bb (Nikomakhos-etikk, bok I, kap. 7, s. 266).\\\"\\n  }\\n]\""
