gpt_svar = "\"[\\n    {\\n        \\\"testName\\\": \\\"Definisjon av dydsetikk\\\",\\n        \\\"description\\\": \\\"Svarer studenten p\\u00e5 hva dydsetikk er, og hvordan det skiller seg fra andre etiske teorier (f.eks. pliktetikk eller konsekvensetikk)?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Du nevner ikke eksplisitt hva dydsetikk er. Dydsetikk handler om \\u00e5 utvikle gode karaktertrekk (dyder) som et fundament for moralsk handling, fremfor \\u00e5 f\\u00f8lge regler (pliktetikk) eller vurdere konsekvenser av handlinger (konsekvensetikk). Det kan v\\u00e6re nyttig \\u00e5 definere dette f\\u00f8r du diskuterer anvendelsen (Antonsen et al., 2025, s. 260\\u2013262).\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Anvendelsesproblemet\\\",\\n        \\\"description\\\": \\\"Drar studenten frem kritikk mot dydsetikkens praktiske anvendelighet, slik oppgaven ber om?\\\",\\n        \\\"iscorrect\\\": true,\\n        \\\"resultat\\\": \\\"Du ber\\u00f8rer indirekte kritikken ved \\u00e5 p\\u00e5peke at dydige handlinger kan f\\u00f8re til uheldige konsekvenser (som Mandelas fengselsopphold). Dette er relevant, men du kan tydeligere knytte det til den overordnede innvendingen om at dydsetikk mangler klare retningslinjer for handling i konkrete situasjoner. (Se f.eks. Christensen, 2008, s. 49\\u201350).\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Eksempelanalyse\\\",\\n        \\\"description\\\": \\\"Er eksemplet (Mandela) godt valgt og analysert i lys av dydsetikk?\\\",\\n        \\\"iscorrect\\\": true,\\n        \\\"resultat\\\": \\\"Eksemplet med Mandela er godt valgt fordi det illustrerer en dyd (mot) som ikke n\\u00f8dvendigvis f\\u00f8rer til personlig lykke. Men du kunne g\\u00e5tt dypere inn i hvorfor dette utfordrer dydsetikken: Er det problematisk at en dydig handling kan ha s\\u00e5 store personlige kostnader? Hva sier det om forholdet mellom dyd og velv\\u00e6re (eudaimonia)? (Antonsen et al., 2025, s. 264\\u2013265).\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Motargumenter\\\",\\n        \\\"description\\\": \\\"Presenterer studenten motargumenter mot kritikken av dydsetikken?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Du presenterer ingen motargumenter til innvendingen. Dydsetikere som Aristoteles vil hevde at handlinger m\\u00e5 forst\\u00e5s i en st\\u00f8rre livskontekst \\u2013 Mandelas fengsling kan ses som en del av en dydig livsf\\u00f8rsel som til slutt f\\u00f8rte til frihet og rettferdighet for mange. Videre kan dydsetikk gi retningslinjer gjennom begreper som \\u00abdet gyldne middelvei\\u00bb eller \\u00abdet en klok person ville gjort\\u00bb (Antonsen et al., 2025, s. 266\\u2013267).\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Konklusjon\\\",\\n        \\\"description\\\": \\\"Tar studenten stilling til oppgavens sp\\u00f8rsm\\u00e5l (\\u00abEr du enig i innvendingen?\\u00bb) p\\u00e5 en begrunnet m\\u00e5te?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Du avslutter med \\u00e5 si at sammenhengen mellom dyd og lykke kan virke kontraintuitiv, men du tar ikke eksplisitt stilling til om du er enig i at dydsetikk er vanskelig \\u00e5 anvende i praksis. Pr\\u00f8v \\u00e5 konkludere med et klart standpunkt, f.eks.: \\u00abSelv om dydsetikk kan virke vag i konkrete situasjoner, gir den viktige innsikter om karakterutvikling som andre teorier overser.\\u00bb\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Bruk av kilder\\\",\\n        \\\"description\\\": \\\"Bruker studenten pensumlitteraturen p\\u00e5 en relevant m\\u00e5te?\\\",\\n        \\\"iscorrect\\\": true,\\n        \\\"resultat\\\": \\\"Du refererer riktig til Christensen (2008) og Antonsen et al. (2025), men du kunne utnyttet kildene mer aktivt. For eksempel kunne du trekke frem Aristoteles\\u2019 id\\u00e9 om eudaimonia (Antonsen et al., s. 263) eller diskutere Hursthouses (1999) forsvar av dydsetikkens praktiske relevans (omtalt i Christensen, 2008, s. 50\\u201351).\\\"\\n    }\\n    ,\\n    {\\n        \\\"testName\\\": \\\"Fremstilling og struktur\\\",\\n        \\\"description\\\": \\\"Er svaret strukturert p\\u00e5 en m\\u00e5te som gj\\u00f8r det lett \\u00e5 f\\u00f8lge?\\\",\\n        \\\"iscorrect\\\": true,\\n        \\\"resultat\\\": \\\"Svaret er kort og fokusert, men kunne hatt en tydeligere disposisjon. For eksempel: (1) Innledning med definisjon av dydsetikk, (2) presentasjon av innvendingen, (3) analyse av eksempel, (4) motargumenter, (5) konklusjon. Dette ville gjort argumentasjonen mer overbevisende.\\\"\\n    }\\n]\""
