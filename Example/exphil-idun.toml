name = "Eudaimonia vs. subjektiv lykke"
passed = false
mark = 1
description = "Skiller mellom eudaimonia (det gode liv) og subjektiv lykke"
resultat = "Du identifiserer korrekt eudaimonia med <em>det gode liv</em>, men knytter det deretter til <em>lykkelig liv</em> uten nærmere presisering. I dydsetikken er eudaimonia en <strong>objektiv tilstand</strong> av å fungere godt som menneske (flourishing), ikke nødvendigvis en subjektiv følelse av lykke eller tilfredshet. Vurder å forklare at eudaimonia handler om å realisere menneskets iboende potensial, ikke å maksimere nytelse eller godt humør."

[[questions.answers.feedback.testfeedback]]
name = "Konstitutiv forståelse"
passed = false
