/strong> eller <strong>visdom</strong>. Legg til minst to nye dyder med en kort begrunnelse.</p>\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Diskusjon av dydens praktiske anvendelse\\\",\\n    \\\"description\\\": \\\"Viser svaret hvordan en dyd kan lede til en konkret god handling?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"<p>Eksempelet med \\u00e5 si fra eller ikke si fra n\\u00e5r noen stjeler er forvirrende og gir inntrykk av relativisme. En dydig person vil handle i samsvar med dyden (f.eks. \\u00e6rlighet eller rettferdighet) uavhengig av konsekvensene. Gi et tydeligere eksempel som illustrerer dette.</p>\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Struktur og klarhet\\\",\\n    \\\"description\\\": \\\"Er svaret organisert med innledning, hoveddel og konklusjon?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"<p>Svaret mangler en tydelig introduksjon og en avsluttende oppsummering. Del teksten inn i avsnitt: (1) definisjon, (2) dydenes rolle for moral, (3) eksempler p\\u00e5 dyder, (4) kort konklusjon.</p>\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Spr\\u00e5klig presisjon\\\",\\n    \\\"description\\\": \\\"Er spr\\u00e5k og terminologi korrekt og fri for alvorlige grammatiske/semantiske feil?\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"<p>Noen formuleringer er uklare (f.eks. \\u00abmoralske etikken\\u00bb, \\u00abden ebstemte situasjonen\\u00bb). Sjekk stavem\\u00e5ten, unng\\u00e5 dobbel negligens, og bruk fagterminologi (dyde, eudaimonia, habituasjon). Dette gj\\u00f8r svaret lettere \\u00e5 forst\\u00e5.</p>\\\"\\n  }\\n]\""

