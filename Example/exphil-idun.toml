name = "Dyder"
passed = false
mark = 1
description = "Hva er en dyd"
resultat = " En dyd er et positivt karaktertrekk som \ndisponerer en person til å handle på bestemte måter. Eksempler \npå slike dyder kan være å være omsorgsfull eller generøs. Formålet med\nå handle dydig er å bli et godt menneske. Å bli et dydig menneske\ner å utvikle sin karakter. Det er ut fra hva slags person man ønsker å være at man\nhandler, ikke hva som er riktig eller galt i den bestemte situasjonen.\nFormålet er karakterutvikling, ikke å følge regler eller å oppnå bestemte effekter.\nEt slik formål står i motsetning til utilitarismen og \nkantiansk plikt-etikk. Der utilitarismen har fokus på konsekvensene\nav handlingene våre, og kantiansk pliktetikk har fokus hva som er universelt\nog moralsk riktig for alle, har dydsetikken fokus på hva som er det gode\nlivet for meg. Dydsetikken hevdes å ha et brått og Individualistisk fokus\npå etikk. \nDydsetikken er imidlertid ikke uten utfordringer. Kanskje den mest\ninnlysende utfordringen er hvordan man bestemmer hvilke karaktertrekk\nsom er dyder. Det krever en eller annen form for kunnskap om hva\nsom er godt og dårlig for mennesker. Og slike tilbøyeligheter eller karaktertrekk\nsom er ønsket i én kultur eller én tidsepoke, kan være uønskede i en annen.\nUtfordringer knyttet til kulturforskjeller og det faktum at samfunnet stadig er i\nendring gjør at dydsetikken ikke gir oss noe endelig fasitsvar på hva som er\nen dyd og dermed moralske riktige handlinger.\nDydsetikken er  likevel en god tilnærming til å leve gode liv. Det er fordi den\nlovpriser mangfoldet av gode måter å leve på, i motsetning til andre etiske\nteorier som utilitarismen og kantiansk pliktetikk som for simple og for lite\nnyanserte for å håndtere kompleksiteten i menneskelige erfaringer.\nVed å anerkjenne at det finnes mange mulige gode liv, åpner \ndydsetikken for en mer rik og mangfoldig forståelse av hva det vil si\nå leve et godt liv, og hva som er dyder. \nI dagens samfunn er det mange som opplever å være overveldet\nav inntrykk, muligheter og valg. Vi eksponeres for uendelig mange\nmuligheter, og mange sliter med valget mellom for eksempel \nlinjer på videregående eller hva man skal jobbe med. I en tid hvor\nvalgene synes uendelige, er det blant annet dydsetikkens styrke\nat den kan veilede oss. Ved å reflektere over hva vi ønsker å oppnå\nmed livene våre, og hvilke karaktertrekk vi ønsker å utvikle, kan den\ngi̕ oss en livsveileder i jungelen av muligheter.\nTil slutt kan det at vi i dag har tilgang på enormt mye informasjon, men\nogså desinformasjon, og fake news, gjøre det utfordrende for oss\nå vite hva vi skal tro på, hva som er fakta, og hva som er oppdiktet.\nI slike tilfeller kan kildekritikk være en viktig dyd å utvikle. Å være kritisk til\nkilder, og øve seg opp til å skille mellom hva som er godt og dårlig, sant\nog usant, redelig og uredelig, er kanskje en av de viktigste dydene å utvikle\nfor å kunne manøvrere i et samfunn hvor informasjon er tilgjengelig i\noverveldende mengder, og hvor skillet mellom sant og usant blir stadig\nmer utydelig.\nDydsetikken tilbyr slik et verdifullt perspektiv på etikk i en kompleks\nog omskiftelig verden, hvor utviklingen av gode karaktertrekk står\nsentralt i å leve gode liv. \n"
institusjon = "NTNUDragvoll"


