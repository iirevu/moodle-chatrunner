cription\\\": \\\"Refleksjon over hvilke utfordringer dydsetikken har i anvendelse.\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"<p>Du p\\u00e5peker at dydsetikken ikke alltid gir \\u00abkonkrete svar\\u00bb, men dr\\u00f8fter ikke andre vanlige kritikker (f.eks. vaghet i dydeforst\\u00e5else, kulturrelativitet eller konflikter mellom dyder). \\u00c5 belyse slike begrensninger vil styrke svaret ditt.</p>\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Struktur og akademisk spr\\u00e5k\\\",\\n    \\\"description\\\": \\\"Logisk oppbygging, tydelige avsnitt og korrekt spr\\u00e5kbruk.\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"<p>Teksten er greit strukturert med en innledning, argumentasjon og konklusjon. Spr\\u00e5ket er forst\\u00e5elig og akademisk. Litt mer klar inndeling i avsnitt (f.eks. \\u00abInnledning\\u00bb, \\u00abArgumentasjon\\u00bb, \\u00abKonklusjon\\u00bb) vil gj\\u00f8re lesingen enklere.</p>\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Korrekt sitering og kildehenvisning\\\",\\n    \\\"description\\\": \\\"Riktig format p\\u00e5 referanser i teksten og i eventuell litteraturliste.\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"<p>Du bruker parentetisk referanse (Antonsen et al., 2023, s.\\u202f265). Det er akseptabelt, men husk \\u00e5 inkludere en fullstendig bibliografisk oppf\\u00f8ring i sluttlisten for hver kilde.</p>\\\"\\n  }\\n]\""

