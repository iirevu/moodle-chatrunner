tisk visdom\\\",\\n    \\\"description\\\": \\\"Studenten nevner situasjon og kontekst\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Godt at du trekker inn Antonsen et al. sin betoning av at handlinger m\\u00e5 ses i sammenheng med akt\\u00f8rens liv og situasjon (s. 258). Dette peker mot <em>phronesis</em> (praktisk visdom). For \\u00e5 styrke svaret, kunne du forklart <em>hvordan</em> den dydige tar hensyn til konteksten \\u2013 at dyden ikke er en regel, men en evne til \\u00e5 se hva som er tilpasset den konkrete situasjonen.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Eksempler utenfor Tenk!\\\",\\n    \\\"description\\\": \\\"Studenten gir eksempler som ikke st\\u00e5r i l\\u00e6reboken\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Du nevner 'medf\\u00f8lelse' som eksempel, men dette er et ganske generisk eksempel som godt kan finnes i l\\u00e6reb\\u00f8ker (sammen med de fire kardinaldyder: visdom, mot, m\\u00e5tehold og rettferdighet). Oppgaven sp\\u00f8r eksplisitt om eksempler som ikke st\\u00e5r i <em>Tenk!</em>. Pr\\u00f8v \\u00e5 velge mer spesifikke dyder fra Aristoteles' egen liste, som for eksempel 'sannferdighet' (mellom skryt og selvfortielse), 'viddighet'/'omgjengelighet' (mellom t\\u00e5pelighet og surmagethet), eller 'rasehet' (mellom hissighet og apati). Husk \\u00e5 gi minst to eksempler og gjerne forklar hvilke laster de ligger mellom.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Det gode liv (eudaimonia)\\\",\\n    \\\"description\\\": \\\"Studenten kobler dyder til menneskelig blomstring\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"Et sentralt moment i dydsetikken mangler: koblingen til <em>eudaimonia</em> (lykke/det gode liv/menneskelig blomstring). If\\u00f8lge Aristoteles er ikke dyden m\\u00e5let i seg selv, men middel og del av det gode livet. Dydene er de egenskapene som gj\\u00f8r oss i stand til \\u00e5 fungere optimalt som det vi er \\u2013 rasjonelle og sosiale vesener. Kan du integrere dette perspektivet om at dyder handler om \\u00e5 leve et godt liv totalt sett, ikke bare \\u00e5 utf\\u00f8re isolerte gode handlinger?\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Utvikling av karakter\\\",\\n    \\\"description\\\": \\\"Studenten forklarer hvordan dyder utvikles\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Utmerket at du poengterer at dyder utvikles gjennom erfaring og tid. Dette samsvarer med Aristoteles' syn p\\u00e5 at dyden dannes gjennom \\u00f8velse og vane (<em>ethos</em>). Et tip til forbedring: Pr\\u00f8v \\u00e5 forklare <em>mekanismen</em> bak dette \\u2013 hvordan blir en ytre handling til en indre dyd? (Hint: ved gjentatt praktisering av det rette inntil det blir 'andre natur').\\\"\\n  }\\n]\\n```\""

