gpt_svar = "\"```json\\n[\\n    {\\n        \\\"testName\\\": \\\"Definisjon av dyd\\\",\\n        \\\"description\\\": \\\"Har studenten definert hva en dyd er?\\\",\\n        \\\"iscorrect\\\": true,\\n        \\\"resultat\\\": \\\"Godt fors\\u00f8k! Du har gitt en god beskrivelse av hva en dyd er: et positivt karaktertrekk som disponerer oss til \\u00e5 handle p\\u00e5 bestemte m\\u00e5ter. For \\u00e5 styrke besvarelsen kan det v\\u00e6re nyttig \\u00e5 presisere at dyder ses som en midtvei mellom to laster (eksempelvis mot mellom feighet og dumdristighet). Se om du kan integrere det fra dydsetikken slik Aristoteles beskriver det.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Dydsetikkens fokus\\\",\\n        \\\"description\\\": \\\"Forklarer studenten hva som st\\u00e5r sentralt i dydsetikken?\\\",\\n        \\\"iscorrect\\\": true,\\n        \\\"resultat\\\": \\\"Du nevner riktig at dydsetikken legger vekt p\\u00e5 \\u00abhvilken person jeg \\u00f8nsker \\u00e5 v\\u00e6re\\u00bb i stedet for regler eller konsekvenser. Men det er litt misvisende \\u00e5 si at man ikke tar moralsk etikk i betraktning \\u2013 snarere er poenget at dydsetikken fokuserer p\\u00e5 akt\\u00f8rens moralske karakter framfor regler eller utfall. Pr\\u00f8v \\u00e5 tydeliggj\\u00f8re dette skillet. Om du vil grave dypere, kan du se hvordan Aristoteles og andre dydsetikere legger vekt p\\u00e5 praktisk visdom (fronesis) for \\u00e5 avgj\\u00f8re riktig handling i konkrete situasjoner.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Sammenheng mellom dyder og moralsk handling\\\",\\n        \\\"description\\\": \\\"Forklarer studenten hvordan dyder henger sammen med moralsk handling?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Du beskriver godt at dyder disponerer oss til \\u00e5 handle riktig i ulike situasjoner. For \\u00e5 styrke svaret kunne du ha utdypet hvordan dyder utvikles gjennom vane og praksis (jf. Aristoteles), og hvordan de gj\\u00f8r oss i stand til \\u00e5 respondere riktig i komplekse situasjoner. Hint: Tenk p\\u00e5 dyder som ferdigheter i det moralske livet \\u2013 f.eks. hvordan mot gj\\u00f8r oss i stand til \\u00e5 st\\u00e5 opp for det som er riktig.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Eksempler p\\u00e5 dyder utenfor *Tenk!*-boken\\\",\\n        \\\"description\\\": \\\"Har studenten gitt eksempler p\\u00e5 dyder som ikke st\\u00e5r i *Tenk!*-boken?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Du har nevnt eksempler som omsorg og gener\\u00f8sitet, men disse er dessverre hentet fra *Tenk!*-boken. Pr\\u00f8v \\u00e5 tenke p\\u00e5 dyder som ikke er listet der, f.eks.:\\n        <ul>\\n            <li><b>T\\u00e5lmodighet:</b> Evnen til \\u00e5 holde ut i m\\u00f8te med vanskeligheter eller urett.</li>\\n            <li><b>Ydmykhet:</b> \\u00c5 erkjenne egne begrensninger og verdsette andres bidrag.</li>\\n            <li><b>Rettferdighetssans:</b> Evnen til \\u00e5 behandle alle med likeverd, ogs\\u00e5 n\\u00e5r det er ubehagelig.</li>\\n            <li><b>Sivilcourage:</b> \\u00c5 v\\u00e5ge \\u00e5 si fra eller handle n\\u00e5r andre tier, selv om det inneb\\u00e6rer personlig risiko.</li>\\n        </ul>\\n        Tenk ogs\\u00e5 p\\u00e5 sammenhengen mellom disse dydene og praktisk moralsk handling!\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Eksemplifisering av situasjonsbetinget dydshandling\\\",\\n        \\\"description\\\": \\\"Har studenten gitt et godt eksempel p\\u00e5 situasjonsbetinget dydshandling?\\\",\\n        \\\"iscorrect\\\": true,\\n        \\\"resultat\\\": \\\"Eksempelet ditt med stjeling er relevant, men det mangler litt dybde i forklaringen. Et sterkere eksempel ville ha vist hvordan <b>samme</b> dyd (f.eks. \\u00e6rlighet) kan ut\\u00f8ves forskjellig i ulike kontekster \\u2013 eller hvordan to ulike dyder kan komme i konflikt (f.eks. \\u00e6rlighet vs. medf\\u00f8lelse). Pr\\u00f8v \\u00e5 utbrodere eksempelet slik at det tydelig viser hvordan praktisk visdom (fronesis) spiller inn for \\u00e5 avgj\\u00f8re hva som er den rette handlingen i akkurat <i>denne</i> situasjonen.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Kritisk refleksjon\\\",\\n        \\\"description\\\": \\\"Inneholder besvarelsen en kritisk refleksjon eller diskusjon av dydsetikkens styrker/svakheter?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Ditt svar mangler en kritisk dimensjon. En veldig god besvarelse ville ha inkludert en kort diskusjon av dydsetikkens styrker (f.eks. at den tar utgangspunkt i menneskelig erfaring) <i>eller</i> svakheter (f.eks. at den kan v\\u00e6re vag i konkrete moralske dilemmaer). Et hint: Hva skjer hvis to dyder st\\u00e5r i konflikt, som \\u00e6rlighet og barmhjertighet? Gir dydsetikken oss verkt\\u00f8y til \\u00e5 l\\u00f8se slike konflikter?\\\"\\n    }\\n]\\n```\""

