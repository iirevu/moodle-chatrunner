resultat = "Du nevner at dydene bidrar til at vi lever gode liv, men du har ikke eksplisitt forklart hva som menes med 'lykke' i dydsetikkens sammenheng. I dydsetikken, spesielt hos Aristoteles, er <i>eudaimonia</i> (ofte oversatt som lykke eller vellevnad) ikke bare en følelse, men et liv i samsvar med menneskets essens og med dyd. Lykke er derfor ikke noe som oppnås gjennom enkelte handlinger, men et liv formet av dyd. Prøv å uttrykke denne sammenhengen mer eksplisitt."

