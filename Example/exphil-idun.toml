description = "Forstår at dyder konstituerer, ikke bare fører til, eudaimonia"
resultat = "Formuleringen \"ved å handle dydig\" kan forstås instrumentelt, som om dydig handling er et <em>middel</em> for å oppnå lykke (som et resultat). I Aristotelisk etikk er forholdet sterkere: <strong>dydige aktiviteter konstituerer selve eudaimonia</strong>. Et liv uten dyd <em>er</em> et liv uten eudaimonia – det er ikke to atskilte steder hvor man først handler dydig, så oppnår lykke. Kan du tydeliggjøre dette konstitutive forholdet?"

