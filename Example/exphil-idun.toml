passed = false
gpt_svar = "\"```json\\n[\\n    {\\n        \\\"testName\\\": \\\"Definisjon av dyd\\\",\\n        \\\"description\\\": \\\"Har studenten forklart hva en dyd er?\\\",\\n        \\\"iscorrect\\\": true,\\n        \\\"resultat\\\": \\\"\\n        <p>Bra! Du har gitt en god og kortfattet definisjon av hva en dyd er. Du viser til at en dyd er et positivt karaktertrekk som anses som moralsk verdifullt.</p>\\n        <p>For \\u00e5 utdype dette kan det v\\u00e6re lurt \\u00e5 vise til at dyder if\\u00f8lge dydsetikken ikke bare er egenskaper, men ogs\\u00e5 <b>vaner</b> eller <b>disposisjoner</b> som utvikles gjennom gjentatt handling og praksis (sml. Aristoteles\\u2019 syn p\\u00e5 dyd som et mellomstand mellom to ekstremer, f.eks. mellom feighet og dumdristighet).</p>\\n        <p>Kan du utvikle dette litt mer om hvordan dyder formes eller eksemplifisere hvordan de fungerer i praksis?</p>\\n        \\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Dyder og moralsk handling\\\",\\n        \\\"description\\\": \\\"Har studenten forklart sammenhengen mellom dyder og moralsk handling?\\\",\\n        \\\"iscorrect\\\": true,\\n        \\\"resultat\\\": \\\"\\n        <p>Godt fors\\u00f8k! Du har begynt \\u00e5 forklare sammenhengen mellom dyder og moralsk handling ved \\u00e5 nevne at dyder f\\u00f8rer til at vi handler p\\u00e5 en viss m\\u00e5te.</p>\\n        <p>If\\u00f8lge dydsetikken (spesielt Aristoteles) handler dyder om \\u00e5 <b>utvikle den rette karakteren</b> slik at man <i>instinktivt</i> handler p\\u00e5 en m\\u00e5te som fremmer det gode liv (eudaimonia). Det er ikke bare enkeltst\\u00e5ende handlinger som teller, men <b>den type person man er</b>.</p>\\n        <p>Kan du utdype hvordan dyder p\\u00e5virker <em>hvorfor</em> vi handler moralsk? Hva mener dydsetikken om regler eller plikter sammenlignet med karakterbasert etikk?</p>\\n        \\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Eksempel p\\u00e5 dyd i handling\\\",\\n        \\\"description\\\": \\\"Har studenten gitt et eksempel som illustrerer en dyd i handling?\\\",\\n        \\\"iscorrect\\\": true,\\n        \\\"resultat\\\": \\\"\\n        <p>Veldig bra eksempel! Du bruker \\u2018mot\\u2019 og \\u2018rettferdighet\\u2019 som dyder i en konkret situasjon (\\u00e5 st\\u00e5 opp for noen som blir ignorert). Dette viser at du forst\\u00e5r hvordan dyder fungerer i praksis.</p>\\n        <p>For \\u00e5 styrke eksemplet kunne det v\\u00e6re fint \\u00e5 utdype <b>hvorfor</b> nettopp disse dydene kommer til uttrykk her. F.eks.: Mot handler om \\u00e5 overvinne frykt for \\u00e5 gj\\u00f8re det rette, mens rettferdighet handler om \\u00e5 gi folk det de fortjener eller har krav p\\u00e5.</p>\\n        <p>Eksemplet ditt er hentet fra <i>Tenk!</i>-boken. Oppgaven ber om eksempler som <b>ikke</b> st\\u00e5r der. Klarer du \\u00e5 tenke p\\u00e5 andre dyder som ikke er nevnt i boken?</p>\\n        \\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Nye eksempler p\\u00e5 dyder\\\",\\n        \\\"description\\\": \\\"Har studenten gitt eksempler p\\u00e5 dyder som ikke st\\u00e5r i *Tenk!*-boken?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"\\n        <p>Du har forel\\u00f8pig ikke gitt eksempler p\\u00e5 dyder som <em>ikke</em> st\\u00e5r i <i>Tenk!</i>-boken. Oppgaven ber spesifikt om dette.</p>\\n        <p>Her er noen hint til dyder som ofte ikke nevnes i innf\\u00f8ringsb\\u00f8ker, men som likevel er sentrale i dydsetikken eller dagliglivet:</p>\\n        <ul>\\n            <li><b>T\\u00e5lmodighet</b>: Evnen til \\u00e5 holde ut i m\\u00f8te med motgang eller forsinkelser uten \\u00e5 bli frustrert.</li>\\n            <li><b>Visdom</b>: Ikke bare kunnskap, men evnen til \\u00e5 bruke kunnskap p\\u00e5 en god m\\u00e5te i praksis (f.eks. n\\u00e5r man gir r\\u00e5d).</li>\\n            <li><b>Barmhjertighet</b>: \\u00c5 vise medf\\u00f8lelse og n\\u00e5de overfor andre, spesielt n\\u00e5r de har mislykkes.</li>\\n            <li><b>Autentisitet</b>: \\u00c5 handle i tr\\u00e5d med sine egne verdier og ikke la seg presse av ytre forventninger.</li>\\n            <li><b>Gr\\u00e5dighetens motsetning</b> F.eks. <b>gener\\u00f8sitet</b> eller <b>n\\u00f8ysomhet</b>: Evnen til \\u00e5 dele eller begrense forbruk for andres eller fellesskapets beste.</li>\\n        </ul>\\n        <p>Pr\\u00f8v \\u00e5 velge \\u00e9n eller to av disse (eller dine egne forslag) og forklar hvordan de kan vise seg i konkrete handlinger eller situasjoner.</p>\\n        \\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Dydsetikkens kjerneideer\\\",\\n        \\\"description\\\": \\\"Har studenten gjort rede for dydsetikkens sentrale id\\u00e9er?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"\\n        <p>Du har s\\u00e5 langt ikke utdypet hva som er <b>spesifikt for dydsetikken</b> som etisk teori. Dydsetikken skiller seg fra f.eks. pliktetikk (Kant) eller konsekvensetikk (utilitarisme) ved at den vektlegger <i>personen som handler</i> fremfor regler eller effekter av handlinger.</p>\\n        <p>Her er noen sentrale sp\\u00f8rsm\\u00e5l du kan reflektere over for \\u00e5 vise forst\\u00e5else av dydsetikken:</p>\\n        <ul>\\n            <li>Hva mener Aristoteles med at dyd er et <b>mellomstand</b> (f.eks. mot vs. feighet/dumdristighet)?</li>\\n            <li>Hvordan utvikles dyder if\\u00f8lge dydsetikken? (Hint: Gjennom praksis og etterligning av dydige forbilder.)</li>\\n            <li>Hva er m\\u00e5let med \\u00e5 utvikle dyder? (Hint: Aristoteles\\u2019 begrep <i>eudaimonia</i> \\u2013 lykke eller menneskelig blomstring.)</li>\\n            <li>Hvordan vurderer man om en handling er moralsk god i dydsetikken? (Hint: \\u00abHva ville en dydig person gjort?\\u00bb)</li>\\n        </ul>\\n        <p>Pr\\u00f8v \\u00e5 koble noen av disse punktene til eksemplet ditt eller andre deler av svaret ditt.</p>\\n        \\\"\\n    }\\n]\\n```\""

