org og gener\\u00f8sitet, men disse er sv\\u00e6rt generelle dyder som ofte finnes i l\\u00e6reb\\u00f8ker (inkludert Tenk!). Oppgaven ber spesifikt om eksempler som <em>ikke</em> st\\u00e5r i boken. Pr\\u00f8v \\u00e5 finne mer spesifikke eller mindre vanlige dyder, for eksempel: <em>ysmyndighet</em>, <em>t\\u00e5lmodighet</em>, <em>integritet</em>, <em>\\u00e5rv\\u00e5kenhet</em>, eller <em>venskap</em> (slik Aristoteles forst\\u00e5r det). Viktig: Det holder ikke \\u00e5 liste opp dyder \\u2013 du b\\u00f8r ogs\\u00e5 forklare <em>hva</em> den aktuelle dyden inneb\\u00e6rer i praksis.\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Presisjon i begrepsbruk\\\",\\n    \\\"description\\\": \\\"Klar og korrekt bruk av fagbegreper\\\",\\n    \\\"iscorrect\\\": false,\\n    \\\"resultat\\\": \\\"V\\u00e6r oppmerksom p\\u00e5 begrepsbruken: \\u00abMoralske etikken\\u00bb er et uklart/redundant uttrykk (etikk handler allerede om moral). Mulig du mente \\u00abdeontologisk etikk\\u00bb, \\u00abpliktestikk\\u00bb eller \\u00abregelbasert etikk\\u00bb? Pass ogs\\u00e5 p\\u00e5 skrivefeil ('ebstemte' i stedet for 'bestemte').\\\"\\n  },\\n  {\\n    \\\"testName\\\": \\\"Situasjonsforst\\u00e5else (phronesis)\\\",\\n    \\\"description\\\": \\\"Studenten forklarer at dydsetikk er situasjonsbestemt\\\",\\n    \\\"iscorrect\\\": true,\\n    \\\"resultat\\\": \\\"Du har rett i at dydsetikken er opptatt av den konkrete situasjonen (kontekst), men husk at dette ikke betyr 'situasjonsetikk' i betydningen 'hva som helst'. Det handler om at den dydige personen m\\u00e5 bruke praktisk visdom (<em>phronesis</em>) for \\u00e5 finne den gyldne middelvei i den spesifikke konteksten \\u2013 ikke at handlingen vurderes ut fra hva den f\\u00f8rer til (konsekvenser).\\\"\\n  }\\n]\\n```\""

