gpt_svar = "\"```json\\n[\\n    {\\n        \\\"testName\\\": \\\"Definisjon av dyd\\\",\\n        \\\"description\\\": \\\"Har studenten definert hva en dyd er?\\\",\\n        \\\"iscorrect\\\": true,\\n        \\\"resultat\\\": \\\"Du har et godt utgangspunkt for \\u00e5 definere hva en dyd er! Du nevner at dyder er <i>gode karaktertrekk</i> som former personen og handlingene deres. Det er helt riktig, men kan du utdype hva som gj\\u00f8r et karaktertrekk til en <i>dyd</i>, framfor bare en positiv egenskap? If\\u00f8lge dydsetikken handler det om mer enn bare \\u00e5 v\\u00e6re en \\u00abfin egenskap\\u00bb \\u2013 tenk p\\u00e5 Aristoteles\\u2019 id\\u00e9 om \\u2018den gylne middelvei\\u2019 (Antonsen et al., 2023, s. 257), som beskriver en balanse mellom to ytterpunkter. For eksempel ligger <i>mot</i> mellom feighet og dumdristighet. Klarer du \\u00e5 knytte dette inn?\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Dyd og moralsk handling\\\",\\n        \\\"description\\\": \\\"Forklarer studenten sammenhengen mellom dyder og god moralsk handling?\\\",\\n        \\\"iscorrect\\\": true,\\n        \\\"resultat\\\": \\\"Du treffer godt n\\u00e5r du skriver at handlinger i samsvar med dydene blir <i>moralsk gode</i>, og at dette er et sentralt poeng i dydsetikken. Men hva er det som gj\\u00f8r at dydene f\\u00f8rer til <i>gode</i> handlinger? If\\u00f8lge dydsetikken er dyder karaktertrekk som gj\\u00f8r oss i stand til \\u00e5 handle med <i>praktisk visdom</i> (phronesis) \\u2013 alts\\u00e5 evnen til \\u00e5 vurdere hva som er riktig i en gitt situasjon (Antonsen et al., 2023, s. 259). Kan du si noe om hvordan denne visdommen spiller inn n\\u00e5r man handler dydig? For eksempel, hvordan visste du at det \\u00e5 sp\\u00f8rre vennen din om hvordan det gikk, var det <i>riktige</i> \\u00e5 gj\\u00f8re i den situasjonen?\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Eksempel p\\u00e5 dyd i handling\\\",\\n        \\\"description\\\": \\\"Gir studenten et godt eksempel p\\u00e5 en dyd i praksis?\\\",\\n        \\\"iscorrect\\\": true,\\n        \\\"resultat\\\": \\\"Eksemplet ditt med <i>medf\\u00f8lelse</i> er godt og relevant! Du viser tydelig hvordan dyden kommer til uttrykk i en konkret situasjon. Men for \\u00e5 gj\\u00f8re det enda sterkere, kan du pr\\u00f8ve \\u00e5 knytte handlingen eksplisitt til selve dyden. For eksempel: Hvordan viser din <i>medf\\u00f8lelse</i> seg i det \\u00e5 lytte til vennen? Er det noe i handlingen din som viser at du faktisk <i>erkjenner</i> deres lidelse \\u2013 og at du handler ut fra det? Dette kan bidra til \\u00e5 tydeliggj\\u00f8re hvordan dyden <i>moter</i> handlingen.\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Nye eksempler p\\u00e5 dyder\\\",\\n        \\\"description\\\": \\\"Presenterer studenten dyder som ikke st\\u00e5r i *Tenk!*-boken?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Du har gitt et eksempel p\\u00e5 en dyd (<i>medf\\u00f8lelse</i>), men oppgaven ber spesifikt om <i>nye</i> dyder som ikke st\\u00e5r i *Tenk!*-boken (Antonsen et al., 2023). Medf\\u00f8lelse er nemlig nevnt der (s. 259). Pr\\u00f8v \\u00e5 tenke p\\u00e5 dyder som kanskje ikke er like opplagte, men som likevel er sentrale i moralske handlinger. Kanskje dyder som <i>t\\u00e5lmodighet</i>, <i>ydmykhet</i>, <i>integritet</i>, <i>raushet</i> (utenom det materielle), eller <i>nysgjerrighet</i> (i kontekst av l\\u00e6ring og \\u00e5penhet)? Hvordan ville disse kunne komme til uttrykk i konkrete handlinger?\\\"\\n    },\\n    {\\n        \\\"testName\\\": \\\"Dydsetikkens perspektiv\\\",\\n        \\\"description\\\": \\\"Forklarer studenten hvordan dydsetikken skiller seg fra andre etiske teorier?\\\",\\n        \\\"iscorrect\\\": false,\\n        \\\"resultat\\\": \\\"Du beskriver godt hvordan dydsetikken fokuserer p\\u00e5 <i>akt\\u00f8ren</i> og deres karakter, men du sier lite om hvordan dette skiller seg fra andre etiske teorier. For eksempel legger <i>pliktetikk</i> (som Kant) vekt p\\u00e5 handlingens overensstemmelse med moralske regler, mens <i>konsekvensetikk</i> (som utilitarisme) fokuserer p\\u00e5 utfallet av handlingen. Dydsetikken skiller seg ut ved at den sp\\u00f8r: <i>Hva slags person b\\u00f8r jeg v\\u00e6re?</i>, heller enn <i>Hva b\\u00f8r jeg gj\\u00f8re?</i> eller <i>Hva blir resultatet?</i> (Antonsen et al., 2023, s. 256). Kan du si noe om hvordan dette perspektivet kan gi bedre eller d\\u00e5rligere svar p\\u00e5 moralske dilemmaer sammenlignet med andre teorier?\\\"\\n    }\\n]\\n```\""

