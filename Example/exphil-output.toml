prologuehtml = ""
epiloguehtml = "<h2 style=\"background-color:Lime;\">definisjon av dyd</h2>\n<p>Bra jobba! Du beskriver tydelig at dyder er positive karaktertrekk som former våre handlinger og hvem vi er. </p>\n<h2 style=\"background-color:Lime;\">dydsetikkens kobling til moral</h2>\n<p>Flott! Du belyser hvordan dyder er involvert i utviklingen av moralske karaktertrekk over tid. </p>\n<h2 style=\"background-color:Lime;\">livssituasjonens betydning</h2>\n<p>Bra observasjon om at livssituasjonen påvirker hva som anses som gode handlinger i dydsetikken. </p>\n<h2 style=\"background-color:Lime;\">eksempel på dyd</h2>\n<p>Ditt eksempel om medfølelse illustrerer godt hvordan dyder kan anvendes i praksis. </p>\n<h2 style=\"background-color:Red;\">eksempler utover lærebok</h2>\n<p>Du nevnte medfølelse, som er bra. Men prøv å inkludere flere eksempler på dyder som ikke er nevnt i læreboken, som f.eks., ansvarsbevissthet eller utholdenhet. </p>"

[[questions.answers]]
ans = "«Dyd er positive karaktertrekk eller egenskaper som disponerer\noss til å handle på bestemte måter» (Antonsen et al.s.265). I\ndydsetikken så legger man ikke vekt på moralske regler og\nkonsekvenser, men man handler ut fra «hvilken person jeg ønsker\nå være». Man tar altså ikke i betraktning hva som er den\nmoralske etikken når vi tenker på dydsetikk, men heller hva som\ner riktig handling i den ebstemte situasjonen.xa0Eksempel på dyder\ner for eksempel å være en omsorgsfull person og en generøs\nperson. Det er å handle riktig ut fra situasjon. For eksempel\nkan det være en dyd å si fra om noen stjeler. Men i en annen\nsituasjon kan det være en dyd å ikke si fra dersom noen stjeler.\nAlt etter hva handlingen fører til. (Antonsen et al.s.265).xa0\n"
[[questions.answers.feedback]]
