prologuehtml = ""
epiloguehtml = "<h2 style=\"background-color:Lime;\">Definisjon av dyd</h2>\n<p>Du har korrekt identifisert en dyd som et positivt karaktertrekk, noe som er sentralt i dydsetikken. En dyd kan påvirke hvordan man handler moralsk. </p>\n<h2 style=\"background-color:Lime;\">Eksempel på dyd: mot</h2>\n<p>Du brukte mot som et eksempel, som passer godt innenfor dydsetikken. Dette er en klassisk dyd som mange filosofiske tradisjoner verdsetter. </p>\n<h2 style=\"background-color:Lime;\">Eksempel på dyd: rettferdighet</h2>\n<p>Rettferdighet er et godt eksempel på en dyd. Den illustrerer hvordan en dyd kan påvirke våre moralske handlinger. </p>\n<h2 style=\"background-color:Red;\">Eksempler på unike dyder</h2>\n<p>Det ser ut til at du ikke ga eksempler på dyder som ikke er nevnt i pensum. Forsøk å tenke på andre positive karaktertrekk som kan anses som dyder, for eksempel nysgjerrighet eller ydmykhet. </p>"


[[questions]]
question = "Hva er forholdet mellom dyd og lykke, ifølge dydsetikk?\n"
[[questions.answers]]
ans = "Et vesentlig trekk ved dydsetikken er at vi ikke bare bør strebe\netter å være dydige fordi det får oss til å handle riktig i møte\nmed andre, men fordi dydene bidrar til at vi fungerer godt og\nlever gode liv. (Antonsen et al., 2025, s. 264). Spørsmålet på\nhva som utgjør et vellykket liv, er vanskelig å svare på, men vi\nkan se for oss at det for eksempel handler om å ha gode\nrelasjoner og bruke tiden sin på meningsfulle aktiviteter.\n(Antonsen et al., 2025, s. 264)\n"
[[questions.answers.feedback]]
model = "gpt-4o"

[questions.answers.feedback.feedback]
