epiloguehtml = "<h2 style=\"background-color:Lime;\">Forståelse av dydsetikkens utfordringer</h2>\n<p>Studenten har en god forståelse av utfordringen knyttet til anvendelse av dydsetikken i praksis. De anerkjenner at selv om dydsetikken ikke gir konkrete svar, kan den likevel gi handlingsveiledning. </p>\n<h2 style=\"background-color:Lime;\">Referanse til relevant dydeforsker</h2>\n<p>Studenten refererer til Rosalind Hursthouse, noe som styrker argumentasjonen deres om dydsetikkens evne til å gi en form for handlingsveiledning. Dette viser en god forståelse av litteraturen. </p>\n<h2 style=\"background-color:Lime;\">Eksempler fra dydsetikken</h2>\n<p>Eksemplet med ansvarlighet og hva dydsetikken sier om respekt, ærlighet, gjerrighet og feighet, viser at studenten kan bruke dydsetikkens prinsipper som praktisk veiledning. </p>\n<h2 style=\"background-color:Red;\">Diskuterer dydsetikkanvendelse i praksis</h2>\n<p>Studentens svar kunne vært styrket med en dypere diskusjon om hvordan dydsetikk kan anvendes i spesifikke praktiske eksempler. Å relatere til spesifikke etiske dilemmaer og hvordan dydsetikken kan involvere personlige dyder i disse, vil gi en mer omfattende forståelse. </p>"

[[questions.answers]]
ans = "Ja, noen ganger kan dydige handlinger sette oss i vanskelig\nsituasjoner. F.eks Nelson Mandela som utviste stort mot gjennom\nsin aktivisme mot aparheid i Sør-Afrika, og som satt i fengsel i\n27 år under harde forhold som er langt unna det vi vanligvis\nforbinder med lykke (Christensen, 2008, s 49). Sammenhengen\nmellom dyd å lykke kan derfor virke kontraintuitiv. (Antonsen et\nal., 2025, s. 264)\n"
